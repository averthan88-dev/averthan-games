<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Averthan Games - Community Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  height: 100vh;
  overflow: hidden;
  position: relative;
}
/* Stars background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(253,121,168,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(162,155,254,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:0.2;} 100%{opacity:1;} }

h1, h2, h3, h4 { font-family: 'Fredoka One', cursive; }

/* Layout */
.app { display: flex; height: 100vh; position: relative; z-index: 1; }

/* Sidebar */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
  z-index: 10;
}
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-header .logo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  background: linear-gradient(135deg, #6c5ce7, #fd79a8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.main-menu-btn {
  background: rgba(108,92,231,0.2);
  border: 1px solid rgba(108,92,231,0.3);
  color: #a29bfe;
  padding: 6px 12px;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.main-menu-btn:hover { background: rgba(108,92,231,0.35); }

.sidebar-section { padding: 12px 16px; }
.sidebar-section h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 8px;
}

.room-list { flex: 0 1 auto; overflow-y: auto; min-height: 60px; max-height: 40%; }
.room-item {
  padding: 10px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s;
  border-left: 3px solid transparent;
}
.room-item:hover { background: rgba(255,255,255,0.04); }
.room-item.active {
  background: rgba(108,92,231,0.12);
  border-left-color: #6c5ce7;
}
.room-item .room-name { font-weight: 600; font-size: 0.9rem; }
.room-item .room-count {
  background: rgba(108,92,231,0.25);
  color: #a29bfe;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 700;
}
.create-room-btn {
  width: calc(100% - 32px);
  margin: 8px 16px;
  padding: 10px;
  background: linear-gradient(135deg, rgba(108,92,231,0.3), rgba(253,121,168,0.2));
  border: 1px solid rgba(108,92,231,0.3);
  color: #e0e0e0;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.create-room-btn:hover { background: linear-gradient(135deg, rgba(108,92,231,0.45), rgba(253,121,168,0.3)); }

/* Members panel */
.members-panel {
  border-top: 1px solid rgba(255,255,255,0.06);
  flex: 1;
  min-height: 120px;
  max-height: 50%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.member-item {
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.85rem;
}
.member-item .member-name { display: flex; align-items: center; gap: 8px; }
.member-item .online-dot {
  width: 8px; height: 8px;
  background: #00e676;
  border-radius: 50%;
  display: inline-block;
}
.kick-btn, .ban-btn, .invite-btn {
  border: none;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.7rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  margin-left: 3px;
}
.kick-btn { background: rgba(253,121,168,0.2); color: #fd79a8; }
.kick-btn:hover { background: rgba(253,121,168,0.4); }
.ban-btn { background: rgba(255,50,50,0.2); color: #ff5555; }
.ban-btn:hover { background: rgba(255,50,50,0.4); }
.invite-btn { background: rgba(108,92,231,0.2); color: #a29bfe; }
.invite-btn:hover { background: rgba(108,92,231,0.4); }
.delete-room-btn {
  background: none; border: none; color: rgba(255,255,255,0.2);
  font-size: 0.7rem; cursor: pointer; padding: 0 4px; margin-left: auto;
  font-family: 'Nunito', sans-serif; line-height: 1;
}
.delete-room-btn:hover { color: #fd79a8; }
.member-actions { display: flex; gap: 3px; flex-shrink: 0; }
.invite-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,40,0.95); border: 1px solid rgba(108,92,231,0.5);
  border-radius: 14px; padding: 14px 20px; z-index: 10000;
  font-family: 'Nunito', sans-serif; color: #e0e0e0; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 320px; width: 90%;
  animation: slideUp 0.3s ease;
}
.invite-toast .invite-actions { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
.invite-toast button {
  padding: 6px 18px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
}
.invite-accept { background: linear-gradient(135deg,#6c5ce7,#a29bfe); color: #fff; }
.invite-decline { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
@keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* Main chat area */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
  padding: 14px 20px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.chat-header-left { display: flex; align-items: center; gap: 12px; }
.hamburger {
  display: none;
  background: none;
  border: none;
  color: #e0e0e0;
  font-size: 1.4rem;
  cursor: pointer;
  padding: 4px;
}
.chat-header h2 { font-size: 1.1rem; }
.chat-header .room-info { font-size: 0.8rem; color: #888; }
.user-info {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85rem; color: #a29bfe;
}
.change-name-btn {
  background: none;
  border: 1px solid rgba(162,155,254,0.3);
  color: #a29bfe;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
}
.change-name-btn:hover { background: rgba(162,155,254,0.15); }

/* Messages */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}
.messages-container::-webkit-scrollbar { width: 6px; }
.messages-container::-webkit-scrollbar-track { background: transparent; }
.messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.message {
  max-width: 70%;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.own { align-self: flex-end; }
.message.other { align-self: flex-start; }
.message .bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.4;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.message.own .bubble {
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.other .bubble {
  background: rgba(255,255,255,0.07);
  border-bottom-left-radius: 4px;
}
.message .meta {
  font-size: 0.7rem;
  color: #777;
  margin-bottom: 2px;
  padding: 0 4px;
}
.message.own .meta { text-align: right; }
.message .meta .msg-user { font-weight: 700; color: #a29bfe; }
.message .meta .msg-time { margin-left: 8px; }

.system-msg {
  text-align: center;
  font-size: 0.8rem;
  color: #666;
  padding: 4px 0;
  font-style: italic;
}

/* Input bar */
.input-bar {
  padding: 12px 20px;
  background: rgba(255,255,255,0.03);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  gap: 10px;
}
.input-bar input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e0e0e0;
  padding: 12px 16px;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.input-bar input:focus { border-color: rgba(108,92,231,0.5); }
.input-bar input::placeholder { color: #555; }
.send-btn {
  background: linear-gradient(135deg, #6c5ce7, #fd79a8);
  border: none;
  color: #fff;
  padding: 12px 20px;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.send-btn:hover { opacity: 0.9; }
.send-btn:active { transform: scale(0.95); }

/* Modal overlay */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: #14142a;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px;
  width: 90%;
  max-width: 380px;
  text-align: center;
}
.modal h3 {
  margin-bottom: 8px;
  background: linear-gradient(135deg, #6c5ce7, #fd79a8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.modal p { font-size: 0.85rem; color: #999; margin-bottom: 16px; }
.modal input {
  width: 100%;
  padding: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e0e0e0;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 12px;
}
.modal input:focus { border-color: rgba(108,92,231,0.5); }
.modal-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #6c5ce7, #fd79a8);
  border: none;
  color: #fff;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: opacity 0.2s;
}
.modal-btn:hover { opacity: 0.9; }
.modal-cancel {
  width: 100%;
  padding: 10px;
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: #888;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  margin-top: 8px;
}
.modal-error { color: #fd79a8; font-size: 0.8rem; margin-bottom: 8px; }

/* Sidebar overlay for mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 9;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0; top: 0; height: 100%;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .hamburger { display: block; }
  .message { max-width: 85%; }
}
</style>
</head>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="main-menu-btn">← Main Menu</a>
      <span class="logo">Chat</span>
    </div>

    <div class="sidebar-section">
      <h4>Rooms</h4>

      <div class="sidebar-section">
        <h4>Online Members</h4>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

</div>

<!-- Username Modal -->
<div class="modal-overlay" id="usernameModal" style="display:none;">
  <div class="modal">
    <h3>Welcome to Averthan Chat</h3>
    <p>Choose a username to get started</p>
    <div class="modal-error" id="usernameError"></div>
    <input type="text" id="usernameInput" placeholder="Enter username..." maxlength="20" autocomplete="off">
    <button class="modal-btn" id="usernameSubmit">Join Chat</button>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="createRoomModal" style="display:none;">
  <div class="modal">
    <h3>Create a Room</h3>
    <p>Give your room a name</p>
    <div class="modal-error" id="roomError"></div>
    <input type="text" id="roomNameInput" placeholder="Room name..." maxlength="30" autocomplete="off">
    <button class="modal-btn" id="roomCreateSubmit">Create</button>
    <button class="modal-cancel" id="roomCreateCancel">Cancel</button>
  </div>
</div>

<!-- Change Name Modal -->
<div class="modal-overlay" id="changeNameModal" style="display:none;">
  <div class="modal">
    <h3>Change Username</h3>
    <div class="modal-error" id="changeNameError"></div>
    <input type="text" id="changeNameInput" placeholder="New username..." maxlength="20" autocomplete="off">
    <button class="modal-btn" id="changeNameSubmit">Update</button>
    <button class="modal-cancel" id="changeNameCancel">Cancel</button>
  </div>
</div>

function containsProfanity(text) {
  const lower = text.toLowerCase().replace(/[^a-z ]/g,'');
  // Also check with spaces removed for bypass attempts like "f u c k"
  const nospace = lower.replace(/\s/g,'');
  for (const w of _PF) {
    if (lower.includes(w) || nospace.includes(w)) return true;
  }
  // Check l33tspeak: a=@/4, e=3, i=1/!, o=0, s=$, t=7
  const deleet = text.toLowerCase()
    .replace(/@/g,'a').replace(/4/g,'a')
    .replace(/3/g,'e').replace(/1/g,'i').replace(/!/g,'i')
    .replace(/0/g,'o').replace(/\$/g,'s').replace(/7/g,'t')
    .replace(/[^a-z ]/g,'');
  const deleetnospace = deleet.replace(/\s/g,'');
  for (const w of _PF) {
    if (deleet.includes(w) || deleetnospace.includes(w)) return true;

  return false;

  document.cookie='averthan_username=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
  document.cookie='av_userId=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
  document.cookie='av_username=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
  // Set banned cookie (hard to clear)
  const exp = new Date(Date.now()+365*86400000).toUTCString();
  document.cookie='av_banned=1;expires='+exp+';path=/;SameSite=Lax';
  showBanScreen();
}

function showBanScreen() {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;
      background:#0a0a1a;font-family:'Nunito',sans-serif;text-align:center;padding:20px;">
      <div>
        <div style="font-size:64px;margin-bottom:16px;">🚫</div>
        <div style="font-family:'Fredoka One',cursive;font-size:28px;color:#fd79a8;margin-bottom:12px;">
          You've Been Banned
        </div>
        <div style="color:rgba(255,255,255,0.5);font-size:14px;max-width:400px;line-height:1.6;">
          Your account has been permanently banned for using inappropriate language. 
          This is a kid-friendly community. This ban cannot be appealed.
        </div>
        <a href="index.html" style="display:inline-block;margin-top:24px;padding:10px 24px;
          border-radius:12px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
          text-decoration:none;font-size:13px;">Return to Games</a>
      </div>
    </div>`;
}

function checkBanOnLoad() {
  // Check banned cookie
  if (document.cookie.split(';').some(c=>c.trim().startsWith('av_banned='))) {
    _isBanned = true;
    showBanScreen();
    return true;
  }
  return false;
}

function checkIPBan() {
  if (!_userIP || _isBanned) return;
  db.ref('bans/ips/' + _userIP.replace(/\./g,'_')).once('value', snap => {
    if (snap.val()) {
      _isBanned = true;
      const exp = new Date(Date.now()+365*86400000).toUTCString();
      document.cookie='av_banned=1;expires='+exp+';path=/;SameSite=Lax';
      showBanScreen();
    }
  });
}

function checkUserBan(userId) {
  return db.ref('bans/users/' + userId).once('value').then(snap => {
    if (snap.val()) {
      _isBanned = true;
      const exp = new Date(Date.now()+365*86400000).toUTCString();
      document.cookie='av_banned=1;expires='+exp+';path=/;SameSite=Lax';
      showBanScreen();
      return true;
    }
    return false;
  });
}

// Check ban immediately
if (checkBanOnLoad()) throw new Error('banned');

// User management
let currentUser = { userId: null, username: null };
let currentRoomId = LOBBY_ID;
let messageListener = null;
let membersListener = null;
let roomsListener = null;
let roomOwnerCache = {};

function generateUserId() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'u-' + Array.from({length:16}, ()=>Math.floor(Math.random()*16).toString(16)).join('');
}

function validateUsername(name) {
  name = name.trim();
  if (name.length < 2 || name.length > 20) return false;
  return /^[a-zA-Z0-9 ]+$/.test(name);
}

function saveUser(userId, username) {
  localStorage.setItem('averthan_userId', userId);
  localStorage.setItem('averthan_username', username);
  localStorage.setItem('av_userId', userId);
  localStorage.setItem('av_username', username);
  setCookie('averthan_userId', userId, 30);
  setCookie('averthan_username', username, 30);
}

function loadUser() {
  let userId = localStorage.getItem('averthan_userId') || localStorage.getItem('av_userId') || getCookie('averthan_userId');
  let username = localStorage.getItem('averthan_username') || localStorage.getItem('av_username') || getCookie('averthan_username');
  if (userId && username) {
    currentUser = { userId, username };
    saveUser(userId, username); // sync both stores
    // Check if this user is banned
    checkUserBan(userId);
    return true;
  }
  return false;
}

// UI elements
const usernameModal = document.getElementById('usernameModal');
const usernameInput = document.getElementById('usernameInput');
const usernameSubmit = document.getElementById('usernameSubmit');
const usernameError = document.getElementById('usernameError');
const createRoomModal = document.getElementById('createRoomModal');
const roomNameInput = document.getElementById('roomNameInput');
const roomCreateSubmit = document.getElementById('roomCreateSubmit');
const roomCreateCancel = document.getElementById('roomCreateCancel');
const roomError = document.getElementById('roomError');
const changeNameModal = document.getElementById('changeNameModal');
const changeNameInput = document.getElementById('changeNameInput');
const changeNameSubmit = document.getElementById('changeNameSubmit');
const changeNameCancel = document.getElementById('changeNameCancel');
const changeNameError = document.getElementById('changeNameError');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const messagesContainer = document.getElementById('messagesContainer');
const roomList = document.getElementById('roomList');
const membersList = document.getElementById('membersList');
const roomTitle = document.getElementById('roomTitle');
const roomInfo = document.getElementById('roomInfo');
const userDisplay = document.getElementById('userDisplay');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

// Sidebar toggle
document.getElementById('hamburgerBtn').onclick = () => {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('show');
};
sidebarOverlay.onclick = () => {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');
};

// Username modal
function showUsernameModal() {
  usernameModal.style.display = 'flex';
  usernameInput.focus();
}

function submitUsername() {
  const name = usernameInput.value.trim();
  if (!validateUsername(name)) {
    usernameError.textContent = '2-20 characters, letters, numbers & spaces only';
    return;
  }
  if (containsProfanity(name)) {
    usernameError.textContent = 'That name contains inappropriate language.';
    return;
  }
  usernameError.textContent = '';
  currentUser.userId = generateUserId();
  currentUser.username = name;
  saveUser(currentUser.userId, currentUser.username);
  usernameModal.style.display = 'none';
  initChat();
}
usernameSubmit.onclick = submitUsername;
usernameInput.onkeydown = e => { if (e.key === 'Enter') submitUsername(); };

// Change name
document.getElementById('changeNameBtn').onclick = () => {
  changeNameInput.value = currentUser.username;
  changeNameModal.style.display = 'flex';
  changeNameInput.focus();
};
changeNameCancel.onclick = () => { changeNameModal.style.display = 'none'; };
function submitChangeName() {
  const name = changeNameInput.value.trim();
  if (!validateUsername(name)) {
    changeNameError.textContent = '2-20 characters, letters, numbers & spaces only';
    return;
  }
  changeNameError.textContent = '';
  currentUser.username = name;
  saveUser(currentUser.userId, currentUser.username);
  userDisplay.textContent = name;
  // Update in current room members
  db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}/name`).set(name);
  changeNameModal.style.display = 'none';
}
changeNameSubmit.onclick = submitChangeName;
changeNameInput.onkeydown = e => { if (e.key === 'Enter') submitChangeName(); };

// Create room
document.getElementById('createRoomBtn').onclick = () => {
  roomNameInput.value = '';
  roomError.textContent = '';
  createRoomModal.style.display = 'flex';
  roomNameInput.focus();
};
roomCreateCancel.onclick = () => { createRoomModal.style.display = 'none'; };
function submitCreateRoom() {
  const name = roomNameInput.value.trim();
  if (name.length < 2 || name.length > 30) {
    roomError.textContent = 'Room name must be 2-30 characters';
    return;
  }
  roomError.textContent = '';
  const roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
  db.ref(`rooms/${roomId}`).set({
    name: name,
    ownerId: currentUser.userId,
    ownerName: currentUser.username,
    createdAt: firebase.database.ServerValue.TIMESTAMP
  }).then(() => {
    createRoomModal.style.display = 'none';
    joinRoom(roomId, name);
  });
}
roomCreateSubmit.onclick = submitCreateRoom;
roomNameInput.onkeydown = e => { if (e.key === 'Enter') submitCreateRoom(); };

// Ensure lobby exists
function ensureLobby() {
  db.ref(`rooms/${LOBBY_ID}`).once('value', snap => {
    if (!snap.exists()) {
      db.ref(`rooms/${LOBBY_ID}`).set({
        name: 'Lobby',
        ownerId: 'system',
        ownerName: 'System',
        createdAt: firebase.database.ServerValue.TIMESTAMP
      });
    }
  });
}

// Daily cleanup - first visitor of the day triggers it
function dailyCleanup() {
  db.ref('meta/lastCleanup').once('value', snap => {
    const last = snap.val() || 0;
    const now = Date.now();
    const hoursSince = (now - last) / (1000 * 60 * 60);
    if (hoursSince >= 24) {
      // Claim the cleanup (prevent multiple clients from running it)
      db.ref('meta/lastCleanup').set(now);
      console.log('Running daily cleanup...');
      // Remove all rooms (including lobby messages)
      db.ref('rooms').remove().then(() => {
        // Remove all invites
        db.ref('invites').remove();
        // Recreate lobby
        db.ref(`rooms/${LOBBY_ID}`).set({
          name: 'Lobby',
          ownerId: 'system',
          ownerName: 'System',
          createdAt: now
        });
        console.log('Daily cleanup complete.');
      });
    }
  });
}

// Room list
function listenRooms() {
  if (roomsListener) db.ref('rooms').off('value', roomsListener);
  roomsListener = db.ref('rooms').on('value', snap => {
    const rooms = snap.val() || {};
    roomList.innerHTML = '';
    for (const [id, room] of Object.entries(rooms)) {
      if (!room.name) continue;
      roomOwnerCache[id] = room.ownerId;
      _roomNameCache[id] = room.name;
      const memberCount = room.members ? Object.keys(room.members).length : 0;
      const isMyRoom = room.ownerId === currentUser.userId && id !== LOBBY_ID;
      const div = document.createElement('div');
      div.className = 'room-item' + (id === currentRoomId ? ' active' : '');
      div.innerHTML = `<span class="room-name">${escapeHtml(room.name)}</span><span class="room-count">${memberCount}</span>${isMyRoom ? '<button class="delete-room-btn" data-rid="'+id+'" title="Delete room">✕</button>' : ''}`;
      div.querySelector('.room-name').onclick = () => joinRoom(id, room.name);
      div.querySelector('.room-count').onclick = () => joinRoom(id, room.name);
      if (isMyRoom) {
        div.querySelector('.delete-room-btn').onclick = (e) => {
          e.stopPropagation();
          if (confirm('Delete "' + room.name + '"? All messages will be lost.')) {
            // If currently in this room, go back to lobby
            if (currentRoomId === id) joinRoom(LOBBY_ID, 'Lobby');
            db.ref('rooms/' + id).remove();
          }
        };
      }
      roomList.appendChild(div);
    }
  });
}

// Join room
function joinRoom(roomId, roomName) {
  // Check room-level ban first
  if (roomId !== LOBBY_ID) {
    db.ref(`rooms/${roomId}/banned/${currentUser.userId}`).once('value', snap => {
      if (snap.val()) {
        appendSystemMessage('You are banned from that room.');
        return;
      }
      _doJoinRoom(roomId, roomName);
    });
    return;
  }
  _doJoinRoom(roomId, roomName);
}

function _doJoinRoom(roomId, roomName) {
  // Leave current room
  leaveCurrentRoom();

  currentRoomId = roomId;
  roomTitle.textContent = roomName || roomId;
  messagesContainer.innerHTML = '';

  // Close mobile sidebar
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');

  // Add self to members
  db.ref(`rooms/${roomId}/members/${currentUser.userId}`).set({
    name: currentUser.username,
    joinedAt: firebase.database.ServerValue.TIMESTAMP
  });

  // Also set onDisconnect to remove member
  db.ref(`rooms/${roomId}/members/${currentUser.userId}`).onDisconnect().remove();

  // Listen for messages
  listenMessages(roomId);
  // Listen for members
  listenMembers(roomId);
  // Listen for being kicked
  listenKicked(roomId);

  // Update active room in list
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
}

function leaveCurrentRoom() {
  if (currentRoomId) {
    db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}`).remove();
    db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}`).onDisconnect().cancel();
    if (messageListener) {
      db.ref(`rooms/${currentRoomId}/messages`).off('child_added', messageListener);
      messageListener = null;
    }
    if (membersListener) {
      db.ref(`rooms/${currentRoomId}/members`).off('value', membersListener);
      membersListener = null;
    }
  }
}

// Listen messages
function listenMessages(roomId) {
  messagesContainer.innerHTML = '';
  const ref = db.ref(`rooms/${roomId}/messages`).orderByChild('timestamp').limitToLast(100);
  messageListener = ref.on('child_added', snap => {
    const msg = snap.val();
    if (!msg) return;
    appendMessage(msg);
  });
}

function appendMessage(msg) {
  const isOwn = msg.userId === currentUser.userId;
  const div = document.createElement('div');
  div.className = 'message ' + (isOwn ? 'own' : 'other');
  const time = msg.timestamp ? new Date(msg.timestamp) : new Date();
  const hh = String(time.getHours()).padStart(2,'0');
  const mm = String(time.getMinutes()).padStart(2,'0');
  div.innerHTML = `
    <div class="meta"><span class="msg-user">${escapeHtml(msg.username)}</span><span class="msg-time">${hh}:${mm}</span></div>
    <div class="bubble">${escapeHtml(msg.text)}</div>
  `;
  messagesContainer.appendChild(div);
  // Auto-scroll
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Listen members
function listenMembers(roomId) {
  membersListener = db.ref(`rooms/${roomId}/members`).on('value', snap => {
    const members = snap.val() || {};
    const count = Object.keys(members).length;
    roomInfo.textContent = count + ' member' + (count !== 1 ? 's' : '');
    membersList.innerHTML = '';
    const isOwner = roomOwnerCache[roomId] === currentUser.userId;
    const isInLobby = roomId === LOBBY_ID;
    // Check if current user owns any custom rooms (for invite buttons)
    const myRooms = [];
    if (isInLobby) {
      for (const [rid, oid] of Object.entries(roomOwnerCache)) {
        if (oid === currentUser.userId && rid !== LOBBY_ID) myRooms.push(rid);
      }
    }
    for (const [uid, m] of Object.entries(members)) {
      const div = document.createElement('div');
      div.className = 'member-item';
      let actionsHtml = '';
      const isMe = uid === currentUser.userId;
      if (!isMe) {
        if (isInLobby && myRooms.length > 0) {
          // In lobby: show invite button if I own a room
          actionsHtml = `<div class="member-actions"><button class="invite-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}">Invite</button></div>`;
        } else if (!isInLobby && isOwner) {
          // In custom room as owner: show kick and ban
          actionsHtml = `<div class="member-actions"><button class="kick-btn" data-uid="${uid}">Kick</button><button class="ban-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}">Ban</button></div>`;
        }
      }
      div.innerHTML = `<span class="member-name"><span class="online-dot"></span>${escapeHtml(m.name || 'Unknown')}</span>${actionsHtml}`;
      membersList.appendChild(div);
    }
    // Kick handlers
    membersList.querySelectorAll('.kick-btn').forEach(btn => {
      btn.onclick = () => {
        const uid = btn.dataset.uid;
        db.ref(`rooms/${roomId}/kicked/${uid}`).set(true);
        db.ref(`rooms/${roomId}/members/${uid}`).remove();
        appendSystemMessage('User has been kicked.');
      };
    });
    // Ban handlers (room-level ban + kick)
    membersList.querySelectorAll('.ban-btn').forEach(btn => {
      btn.onclick = () => {
        const uid = btn.dataset.uid;
        const name = btn.dataset.name;
        if (confirm(`Ban ${name} from this room permanently?`)) {
          db.ref(`rooms/${roomId}/banned/${uid}`).set({name: name, bannedAt: Date.now()});
          db.ref(`rooms/${roomId}/kicked/${uid}`).set(true);
          db.ref(`rooms/${roomId}/members/${uid}`).remove();
          appendSystemMessage(`${name} has been banned from this room.`);
        }
      };
    });
    // Invite handlers
    membersList.querySelectorAll('.invite-btn').forEach(btn => {
      btn.onclick = () => {
        const uid = btn.dataset.uid;
        const name = btn.dataset.name;
        if (myRooms.length === 1) {
          // Only one room, invite directly
          sendInvite(uid, name, myRooms[0]);
        } else {
          // Multiple rooms, pick one
          const roomNames = myRooms.map(rid => {
            const rdata = roomOwnerCache[rid] ? rid : rid;
            return rid;
          });
          // Simple: just use first room for now, or show picker
          const pick = prompt('Which room? Enter room number:\\n' + myRooms.map((rid,i)=>`${i+1}. ${getRoomName(rid)}`).join('\\n'));
          const idx = parseInt(pick) - 1;
          if (idx >= 0 && idx < myRooms.length) sendInvite(uid, name, myRooms[idx]);
        }
      };
    });
  });
}

// Room name lookup
let _roomNameCache = {};
function getRoomName(roomId) { return _roomNameCache[roomId] || roomId; }

// Send invite to a user
function sendInvite(targetUid, targetName, roomId) {
  db.ref(`invites/${targetUid}/${roomId}`).set({
    from: currentUser.userId,
    fromName: currentUser.username,
    roomId: roomId,
    roomName: getRoomName(roomId),
    timestamp: Date.now()
  });
  appendSystemMessage(`Invited ${targetName} to ${getRoomName(roomId)}`);
}

// Listen for invites to current user
function listenInvites() {
  db.ref(`invites/${currentUser.userId}`).on('child_added', snap => {
    const inv = snap.val();
    if (!inv) return;
    const key = snap.key;
    showInviteToast(inv, key);
  });
}

function showInviteToast(inv, key) {
  // Remove existing toasts
  document.querySelectorAll('.invite-toast').forEach(el => el.remove());
  const toast = document.createElement('div');
  toast.className = 'invite-toast';
  toast.innerHTML = `
    <div style="font-size:13px;"><strong>${escapeHtml(inv.fromName)}</strong> invited you to</div>
    <div style="font-family:'Fredoka One',cursive;font-size:16px;color:#a29bfe;margin:4px 0;">${escapeHtml(inv.roomName)}</div>
    <div class="invite-actions">
      <button class="invite-accept" onclick="acceptInvite('${key}','${escapeHtml(inv.roomName)}')">Join</button>
      <button class="invite-decline" onclick="declineInvite('${key}')">Decline</button>
    </div>`;
  document.body.appendChild(toast);
  // Auto-dismiss after 15s
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 15000);
}

function acceptInvite(roomId, roomName) {
  document.querySelectorAll('.invite-toast').forEach(el => el.remove());
  db.ref(`invites/${currentUser.userId}/${roomId}`).remove();
  // Check if banned from this room
  db.ref(`rooms/${roomId}/banned/${currentUser.userId}`).once('value', snap => {
    if (snap.val()) {
      appendSystemMessage('You are banned from that room.');
    } else {
      joinRoom(roomId, roomName);
    }
  });
}

function declineInvite(roomId) {
  document.querySelectorAll('.invite-toast').forEach(el => el.remove());
  db.ref(`invites/${currentUser.userId}/${roomId}`).remove();
}

// Listen for being kicked
function listenKicked(roomId) {
  if (roomId === LOBBY_ID) return;
  db.ref(`rooms/${roomId}/kicked/${currentUser.userId}`).on('value', snap => {
    if (snap.val()) {
      // Remove kick flag
      db.ref(`rooms/${roomId}/kicked/${currentUser.userId}`).remove();
      // Go back to lobby
      joinRoom(LOBBY_ID, 'Lobby');
      appendSystemMessage('You were kicked from the room.');
    }
  });
}

function appendSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  messagesContainer.appendChild(div);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Send message
function sendMessage() {
  if (_isBanned) return;
  const text = msgInput.value.trim();
  if (!text) return;
  if (containsProfanity(text)) {
    banUser(text);
    return;
  }
  msgInput.value = '';
  db.ref(`rooms/${currentRoomId}/messages`).push({
    userId: currentUser.userId,
    username: currentUser.username,
    text: text,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
}
sendBtn.onclick = sendMessage;
msgInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

// Cleanup on leave
window.addEventListener('beforeunload', () => {
  if (currentRoomId && currentUser.userId) {
    db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}`).remove();
  }
});

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Init
function initChat() {
  userDisplay.textContent = currentUser.username;
  dailyCleanup();
  ensureLobby();
  listenRooms();
  listenInvites();
  // Small delay to ensure lobby exists and cleanup finishes
  setTimeout(() => joinRoom(LOBBY_ID, 'Lobby'), 800);
}

// Startup
if (loadUser()) {
  initChat();
} else {
  showUsernameModal();
}
</script>
