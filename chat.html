<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* Stars background */

.stars {

}
.star {
  position: absolute;

  border-radius: 50%;

}

h1, h2, h3, h4 { font-family: 'Fredoka One', cursive; }

/* Layout */

.main-menu-btn {

.sidebar-section { padding: 12px 16px; }

}

.invite-btn { background: rgba(108,92,231,0.2); color: #a29bfe; }

}

.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {

  background: rgba(255,255,255,0.03);

.chat-header-left { display: flex; align-items: center; gap: 12px; }

}
.chat-header h2 { font-size: 1.1rem; }
.chat-header .room-info { font-size: 0.8rem; color: #888; }
.user-info {

}
.change-name-btn {
  background: none;
  border: 1px solid rgba(162,155,254,0.3);
  color: #a29bfe;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
}
.change-name-btn:hover { background: rgba(162,155,254,0.15); }

/* Messages */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}
.messages-container::-webkit-scrollbar { width: 6px; }
.messages-container::-webkit-scrollbar-track { background: transparent; }
.messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.message {
  max-width: 70%;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.own { align-self: flex-end; }
.message.other { align-self: flex-start; }
.message .bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.4;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.message.own .bubble {
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.other .bubble {
  background: rgba(255,255,255,0.07);
  border-bottom-left-radius: 4px;
}
.message .meta {
  font-size: 0.7rem;
  color: #777;
  margin-bottom: 2px;
  padding: 0 4px;
}
.message.own .meta { text-align: right; }
.message .meta .msg-user { font-weight: 700; color: #a29bfe; }
.message .meta .msg-time { margin-left: 8px; }

.system-msg {
  text-align: center;
  font-size: 0.8rem;
  color: #666;
  padding: 4px 0;
  font-style: italic;
}

.input-bar {

.input-bar input:focus { border-color: rgba(108,92,231,0.5); }

.send-btn {

  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.send-btn:hover { opacity: 0.9; }
.send-btn:active { transform: scale(0.95); }

/* Modal overlay */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;

.modal-btn {

  padding: 12px;
  background: linear-gradient(135deg, #6c5ce7, #fd79a8);

  color: #fff;

.modal-btn:hover { opacity: 0.9; }
.modal-cancel {

  margin-top: 8px;
}
.modal-error { color: #fd79a8; font-size: 0.8rem; margin-bottom: 8px; }

/* Sidebar overlay for mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 9;

/* Responsive */
@media (max-width: 768px) {
  .sidebar {

  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .hamburger { display: block; }
  .message { max-width: 85%; }
}

// Cookie helpers
function setCookie(name, value, days) {
  const d = new Date(); d.setTime(d.getTime() + days*86400000);
  document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function getCookie(name) {
  const v = document.cookie.match('(^|;)\\s*' + name + '=([^;]*)');
  return v ? decodeURIComponent(v[2]) : null;

// Build regex patterns with word boundaries

function containsProfanity(text) {
  const lower = text.toLowerCase();
  // Word boundary check - "hello" won't match "hell", "classic" won't match "ass"
  for (const rx of _PF_REGEX) {
    if (rx.test(lower)) return true;
  }
  // Check with spaces removed for bypass attempts like "f u c k"
  const nospace = lower.replace(/\s/g,'');
  for (const rx of _PF_REGEX) {
    if (rx.test(nospace)) return true;
  }
  // Check l33tspeak: a=@/4, e=3, i=1/!, o=0, s=$, t=7
  const deleet = text.toLowerCase()
    .replace(/@/g,'a').replace(/4/g,'a')
    .replace(/3/g,'e').replace(/1/g,'i').replace(/!/g,'i')
    .replace(/0/g,'o').replace(/\$/g,'s').replace(/7/g,'t');
  for (const rx of _PF_REGEX) {
    if (rx.test(deleet)) return true;
  }
  return false;
}

function checkBanOnLoad() {
  // Check banned cookie - but verify against Firebase first
  if (document.cookie.split(';').some(c=>c.trim().startsWith('av_banned='))) {
    // Verify the ban still exists in Firebase before blocking
    const uid = localStorage.getItem('averthan_userId') || localStorage.getItem('av_userId');
    if (uid) {
      db.ref('bans/users/' + uid).once('value', snap => {
        if (snap.val()) {
          _isBanned = true;
          showBanScreen();
        } else {
          // Ban was cleared from Firebase - remove local cookie
          document.cookie='av_banned=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
        }
      });
    } else {
      // No userId stored, can't verify - clear the cookie (benefit of the doubt)
      document.cookie='av_banned=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
    }
  }
  return false;
}

function checkIPBan() {
  if (!_userIP || _isBanned) return;
  db.ref('bans/ips/' + _userIP.replace(/\./g,'_')).once('value', snap => {
    if (snap.val()) {
      _isBanned = true;
      const exp = new Date(Date.now()+365*86400000).toUTCString();
      document.cookie='av_banned=1;expires='+exp+';path=/;SameSite=Lax';
      showBanScreen();
    }
  });
}

function checkUserBan(userId) {
  return db.ref('bans/users/' + userId).once('value').then(snap => {
    if (snap.val()) {
      _isBanned = true;
      const exp = new Date(Date.now()+365*86400000).toUTCString();
      document.cookie='av_banned=1;expires='+exp+';path=/;SameSite=Lax';
      showBanScreen();
      return true;
    }
    // If not banned in Firebase, clear any stale local cookie
    document.cookie='av_banned=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=/';
    return false;
  });
}

function generateUserId() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'u-' + Array.from({length:16}, ()=>Math.floor(Math.random()*16).toString(16)).join('');
}

function validateUsername(name) {
  name = name.trim();
  if (name.length < 2 || name.length > 20) return false;
  return /^[a-zA-Z0-9 ]+$/.test(name);
}

function saveUser(userId, username) {
  localStorage.setItem('averthan_userId', userId);

  localStorage.setItem('av_userId', userId);
  localStorage.setItem('av_username', username);

function loadUser() {
  let userId = localStorage.getItem('averthan_userId') || localStorage.getItem('av_userId') || getCookie('averthan_userId');
  let username = localStorage.getItem('averthan_username') || localStorage.getItem('av_username') || getCookie('averthan_username');
  if (userId && username) {
    currentUser = { userId, username };
    saveUser(userId, username); // sync both stores
    // Check if this user is banned
    checkUserBan(userId);
    return true;
  }
  return false;
}

    db.ref('rooms').once('value', snap2 => {

      db.ref('meta/lastCleanup').set(now).catch(err => console.warn('Cleanup claim failed:', err));

// Join room — promise-based chain with a try/finally mutex so a silent
// Firebase error (permission denied, network blip) can never leave us stuck.
let _joinInProgress = false;
// Sequence token: if the user clicks a different room mid-chain, the stale
// chain's _doJoinRoom call is suppressed so we don't race onto the wrong room.
let _joinSeq = 0;

function _read(path) {
  return db.ref(path).once('value').then(s => s.val());
}

async function joinRoom(roomId, roomName) {
  if (_joinInProgress) return;
  _joinInProgress = true;
  const mySeq = ++_joinSeq;
  const uid = currentUser.userId;
  const commit = () => {
    if (mySeq !== _joinSeq) return; // a newer click superseded us
    _doJoinRoom(roomId, roomName);
  };
  try {
    // Already in this room? no-op.
    if (roomId === currentRoomId) return;

    // Lobby is always open — instant.
    if (roomId === LOBBY_ID) { commit(); return; }

    // Fast path: we already know this is a room the user belongs to.
    // The rooms listener updates roomOwnerCache in realtime and userRooms
    // is persisted to localStorage, so these checks don't need a roundtrip.
    if (roomOwnerCache[roomId] === uid || userRooms.has(roomId)) {
      commit();
      return;
    }

    // Slow path — verify authorization with the server.
    const banned = await _read(`rooms/${roomId}/banned/${uid}`);
    if (banned) { appendSystemMessage('You are banned from that room.'); return; }

    const [kicked, ownerId, memberEntry, invite] = await Promise.all([
      _read(`rooms/${roomId}/kicked/${uid}`),
      _read(`rooms/${roomId}/ownerId`),
      _read(`rooms/${roomId}/members/${uid}`),
      _read(`invites/${uid}/${roomId}`),
    ]);
    const isOwner = ownerId === uid;

    if (kicked) {
      if (isOwner) {
        await db.ref(`rooms/${roomId}/kicked/${uid}`).remove()
          .catch(err => console.warn('Clear own kick failed:', err));
        commit(); return;
      }
      if (invite) {
        await Promise.all([
          db.ref(`rooms/${roomId}/kicked/${uid}`).remove(),
          db.ref(`invites/${uid}/${roomId}`).remove(),
        ]).catch(err => console.warn('Clear kick+invite failed:', err));
        commit(); return;
      }
      appendSystemMessage('You were kicked from that room. Ask the owner for a new invite.');
      return;
    }

    if (isOwner || memberEntry) { commit(); return; }

    if (invite) {
      await db.ref(`invites/${uid}/${roomId}`).remove()
        .catch(err => console.warn('Consume invite failed:', err));
      commit(); return;
    }

    appendSystemMessage('You need an invite to join that room.');
  } catch (err) {
    console.warn('[joinRoom] failed:', err);
    appendSystemMessage('Could not join that room — try again.');
  } finally {
    _joinInProgress = false;
  }
}

// Track which rooms user is a member of (so they can switch freely).
// Persisted to localStorage so an invited user auto-re-enters rooms they
// joined in a previous session (until they explicitly Leave).
const USER_ROOMS_KEY = 'av_userRooms';
let userRooms = (() => {
  try {
    const stored = JSON.parse(localStorage.getItem(USER_ROOMS_KEY) || '[]');
    return new Set(Array.isArray(stored) ? stored : []);
  } catch (e) { return new Set(); }
})();
function saveUserRooms() {
  try { localStorage.setItem(USER_ROOMS_KEY, JSON.stringify([...userRooms])); } catch (e) {}
}

function _doJoinRoom(roomId, roomName) {
  // Detach current listeners but DON'T remove membership from rooms we belong to
  detachRoomListeners();

  currentRoomId = roomId;
  roomTitle.textContent = roomName || roomId;
  messagesContainer.innerHTML = '';

  // Remember last room for reconnect
  localStorage.setItem('av_lastRoom', roomId);
  localStorage.setItem('av_lastRoomName', roomName || roomId);

  // Show/hide Leave Room button
  leaveRoomBtn.style.display = (roomId !== LOBBY_ID) ? 'inline-block' : 'none';

  // Close mobile sidebar
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');

  // Add self to members of this room
  db.ref(`rooms/${roomId}/members/${currentUser.userId}`).set({
    name: currentUser.username,
    joinedAt: firebase.database.ServerValue.TIMESTAMP
  });
  db.ref(`rooms/${roomId}/members/${currentUser.userId}`).onDisconnect().remove();
  userRooms.add(roomId);
  saveUserRooms();

  // Always keep presence in lobby too (so others can see you)
  if (roomId !== LOBBY_ID) {
    db.ref(`rooms/${LOBBY_ID}/members/${currentUser.userId}`).remove();
  }

  // Listen for messages
  listenMessages(roomId);
  // Listen for members
  listenMembers(roomId);
  // Listen for being kicked
  listenKicked(roomId);

  // Update active room in list
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
}

function detachRoomListeners() {
  if (currentRoomId) {
    if (messageListener) {
      db.ref(`rooms/${currentRoomId}/messages`).off('child_added', messageListener);
      messageListener = null;
    }
    if (membersListener) {
      db.ref(`rooms/${currentRoomId}/members`).off('value', membersListener);
      membersListener = null;
    }
    if (lobbyMembersListener) {
      db.ref(`rooms/${LOBBY_ID}/members`).off('value', lobbyMembersListener);
      lobbyMembersListener = null;
    }
  }
}

function leaveCurrentRoom() {
  if (currentRoomId) {
    // Remove membership from the room we're leaving
    db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}`).remove();
    db.ref(`rooms/${currentRoomId}/members/${currentUser.userId}`).onDisconnect().cancel();
    userRooms.delete(currentRoomId);
    saveUserRooms();
    detachRoomListeners();
  }
}

// Permanently leave a custom room (go back to lobby)
function leaveRoom() {
  if (currentRoomId && currentRoomId !== LOBBY_ID) {
    // Clear saved room so next connect goes to lobby
    localStorage.removeItem('av_lastRoom');
    localStorage.removeItem('av_lastRoomName');
    leaveCurrentRoom();
    joinRoom(LOBBY_ID, 'Lobby');
  }
}

// Listen messages
function listenMessages(roomId) {
  messagesContainer.innerHTML = '';
  const ref = db.ref(`rooms/${roomId}/messages`).orderByChild('timestamp').limitToLast(100);
  messageListener = ref.on('child_added', snap => {
    const msg = snap.val();
    if (!msg) return;
    appendMessage(msg);
  });
}

function appendMessage(msg) {
  const isOwn = msg.userId === currentUser.userId;
  const div = document.createElement('div');
  div.className = 'message ' + (isOwn ? 'own' : 'other');
  const time = msg.timestamp ? new Date(msg.timestamp) : new Date();
  const hh = String(time.getHours()).padStart(2,'0');
  const mm = String(time.getMinutes()).padStart(2,'0');
  div.innerHTML = `
    <div class="meta"><span class="msg-user">${escapeHtml(msg.username)}</span><span class="msg-time">${hh}:${mm}</span></div>
    <div class="bubble">${escapeHtml(msg.text)}</div>
  `;
  messagesContainer.appendChild(div);
  // Auto-scroll
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Listen members
let lobbyMembersListener = null;

function listenMembers(roomId) {
  // Clean up previous lobby listener
  if (lobbyMembersListener) {
    db.ref(`rooms/${LOBBY_ID}/members`).off('value', lobbyMembersListener);
    lobbyMembersListener = null;
  }

  membersListener = db.ref(`rooms/${roomId}/members`).on('value', snap => {
    const members = snap.val() || {};
    const count = Object.keys(members).length;
    roomInfo.textContent = count + ' member' + (count !== 1 ? 's' : '');

    const isOwner = roomOwnerCache[roomId] === currentUser.userId;
    const isInLobby = roomId === LOBBY_ID;

    if (isInLobby) {
      // In lobby: show all lobby users, with invite button if I own rooms
      renderMembersList(roomId, members, isOwner, null);
    } else {
      // In custom room: show room members + also fetch lobby users for inviting
      lobbyMembersListener = db.ref(`rooms/${LOBBY_ID}/members`).on('value', lobbySnap => {
        const lobbyMembers = lobbySnap.val() || {};
        renderMembersList(roomId, members, isOwner, lobbyMembers);
      });
    }
  });
}

function renderMembersList(roomId, roomMembers, isOwner, lobbyMembers) {
  membersList.innerHTML = '';
  const isInLobby = roomId === LOBBY_ID;

  // Find rooms I own (for invite buttons)
  const myRooms = [];
  for (const [rid, oid] of Object.entries(roomOwnerCache)) {
    if (oid === currentUser.userId && rid !== LOBBY_ID) myRooms.push(rid);
  }

  // Section: Current room members
  if (!isInLobby) {
    const header = document.createElement('div');
    header.className = 'sidebar-section';
    header.innerHTML = `<h4>${getRoomName(roomId)}</h4>`;
    membersList.appendChild(header);
  }

  for (const [uid, m] of Object.entries(roomMembers)) {
    const div = document.createElement('div');
    div.className = 'member-item';
    let actionsHtml = '';
    const isMe = uid === currentUser.userId;
    if (!isMe) {
      const hornBtn = `<button class="horn-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}" title="Honk at ${escapeHtml(m.name||'Unknown')}">🎺</button>`;
      if (isInLobby && myRooms.length > 0) {
        actionsHtml = `<div class="member-actions"><button class="invite-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}">Invite</button>${hornBtn}</div>`;
      } else if (!isInLobby && isOwner) {
        actionsHtml = `<div class="member-actions"><button class="kick-btn" data-uid="${uid}">Kick</button><button class="ban-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}">Ban</button>${hornBtn}</div>`;
      } else if (!isMe) {
        actionsHtml = `<div class="member-actions">${hornBtn}</div>`;
      }
    }
    const youTag = isMe ? ' <span style="color:#a29bfe;font-size:0.7rem;">(you)</span>' : '';
    div.innerHTML = `<span class="member-name"><span class="online-dot"></span>${escapeHtml(m.name || 'Unknown')}${youTag}</span>${actionsHtml}`;
    membersList.appendChild(div);
  }

  // Section: Lobby users (only when in a custom room)
  if (!isInLobby && lobbyMembers) {
    // Filter out users already in current room
    const lobbyOnly = {};
    for (const [uid, m] of Object.entries(lobbyMembers)) {
      if (!roomMembers[uid]) lobbyOnly[uid] = m;
    }
    if (Object.keys(lobbyOnly).length > 0) {
      const header2 = document.createElement('div');
      header2.className = 'sidebar-section';
      header2.style.marginTop = '8px';
      header2.innerHTML = `<h4>Lobby Users</h4>`;
      membersList.appendChild(header2);

      for (const [uid, m] of Object.entries(lobbyOnly)) {
        const div = document.createElement('div');
        div.className = 'member-item';
        let actionsHtml = '';
        const hornBtn2 = `<button class="horn-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}" title="Honk at ${escapeHtml(m.name||'Unknown')}">🎺</button>`;
        if (isOwner) {
          actionsHtml = `<div class="member-actions"><button class="invite-btn" data-uid="${uid}" data-name="${escapeHtml(m.name||'Unknown')}">Invite</button>${hornBtn2}</div>`;
        } else {
          actionsHtml = `<div class="member-actions">${hornBtn2}</div>`;
        }
        div.innerHTML = `<span class="member-name"><span class="online-dot" style="background:#ffaa00;"></span>${escapeHtml(m.name || 'Unknown')}</span>${actionsHtml}`;
        membersList.appendChild(div);
      }
    }
  }

  // Attach event handlers
  membersList.querySelectorAll('.kick-btn').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      db.ref(`rooms/${roomId}/kicked/${uid}`).set(true);
      db.ref(`rooms/${roomId}/members/${uid}`).remove();
      appendSystemMessage('User has been kicked.');
    };
  });
  membersList.querySelectorAll('.ban-btn').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const name = btn.dataset.name;
      if (confirm(`Ban ${name} from this room permanently?`)) {
        db.ref(`rooms/${roomId}/banned/${uid}`).set({name: name, bannedAt: Date.now()});
        db.ref(`rooms/${roomId}/kicked/${uid}`).set(true);
        db.ref(`rooms/${roomId}/members/${uid}`).remove();
        appendSystemMessage(`${name} has been banned from this room.`);
      }
    };
  });
  attachHornHandlers();
  membersList.querySelectorAll('.invite-btn').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const name = btn.dataset.name;
      if (myRooms.length === 1) {
        sendInvite(uid, name, myRooms[0]);
      } else if (myRooms.length > 1) {
        const pick = prompt('Which room? Enter number:\\n' + myRooms.map((rid,i)=>`${i+1}. ${getRoomName(rid)}`).join('\\n'));
        const idx = parseInt(pick) - 1;
        if (idx >= 0 && idx < myRooms.length) sendInvite(uid, name, myRooms[idx]);
      } else if (!isInLobby) {
        // We're in a custom room - invite to this room
        sendInvite(uid, name, roomId);
      }
    };
  });
}

// Room name lookup
let _roomNameCache = {};
function getRoomName(roomId) { return _roomNameCache[roomId] || roomId; }

// Horn button handler (attached after each render)
function attachHornHandlers() {
  membersList.querySelectorAll('.horn-btn').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const name = btn.dataset.name;
      db.ref(`horns/${uid}`).set({ from: currentUser.username, ts: Date.now() });
      btn.textContent = '✓';
      btn.disabled = true;
      setTimeout(() => { btn.textContent = '🎺'; btn.disabled = false; }, 3000);
      appendSystemMessage(`🎺 You announced ${name}!`);
    };
  });
}

// Play a royal trumpet fanfare using Web Audio API
function playHornSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;

    // Trumpet timbre: sawtooth + bright bandpass resonance
    function playNote(freq, start, dur, vol) {
      const osc = ctx.createOscillator();
      const osc2 = ctx.createOscillator(); // 2nd harmonic for brightness
      const band = ctx.createBiquadFilter();
      const gain = ctx.createGain();

      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc2.type = 'sawtooth';
      osc2.frequency.value = freq * 2;

      band.type = 'bandpass';
      band.frequency.value = 1200; // trumpet formant
      band.Q.value = 0.8;

      const g2 = ctx.createGain();
      g2.gain.value = 0.18;

      osc.connect(band);
      osc2.connect(g2); g2.connect(band);
      band.connect(gain);
      gain.connect(ctx.destination);

      // Sharp attack, slight decay, quick release (staccato trumpet)
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(vol, start + 0.022);
      gain.gain.linearRampToValueAtTime(vol * 0.75, start + 0.06);
      gain.gain.setValueAtTime(vol * 0.75, start + dur - 0.04);
      gain.gain.linearRampToValueAtTime(0, start + dur);

      osc.start(start);  osc.stop(start + dur);
      osc2.start(start); osc2.stop(start + dur);
    }

    // Royal fanfare: "Ta-ta-ta — Ta-da-DA-DAAA!"
    // G4  G4  G4  C5        G4  E5  G5  C6(held)
    const notes = [
      // freq,  start,  dur,  vol
      [392,  t + 0.00, 0.14, 0.30], // G4 (short)
      [392,  t + 0.16, 0.14, 0.30], // G4
      [392,  t + 0.32, 0.14, 0.30], // G4
      [523,  t + 0.50, 0.30, 0.38], // C5 (medium)
      [392,  t + 0.88, 0.13, 0.32], // G4
      [659,  t + 1.03, 0.13, 0.36], // E5
      [784,  t + 1.18, 0.18, 0.40], // G5
      [1047, t + 1.40, 0.75, 0.45], // C6 (long, triumphant)
    ];
    notes.forEach(([freq, start, dur, vol]) => playNote(freq, start, dur, vol));

  } catch(e) {}
}

// Listen for horns aimed at current user
function listenHorns() {
  db.ref(`horns/${currentUser.userId}`).on('value', snap => {
    if (!snap.val()) return;
    const data = snap.val();
    playHornSound();
    appendSystemMessage(`🎺 ${escapeHtml(data.from || 'Someone')} announces your arrival!`);
    // Clear the signal
    db.ref(`horns/${currentUser.userId}`).remove();
  });
}

// Send invite to a user
function sendInvite(targetUid, targetName, roomId) {
  // Defensive: only the room owner can invite. Rules also enforce this, but
  // this gives a clear user-facing message instead of a silent rejection.
  if (roomOwnerCache[roomId] && roomOwnerCache[roomId] !== currentUser.userId) {
    appendSystemMessage('Only the room owner can send invites.');
    return;
  }
  db.ref(`invites/${targetUid}/${roomId}`).set({
    from: currentUser.userId,
    fromName: currentUser.username,
    roomId: roomId,
    roomName: getRoomName(roomId),
    timestamp: Date.now()
  }).catch(err => {
    console.warn('Invite failed:', err);
    appendSystemMessage('Invite failed — you may not be the room owner.');
  });
  appendSystemMessage(`Invited ${targetName} to ${getRoomName(roomId)}`);
}

// Listen for invites to current user
function listenInvites() {
  db.ref(`invites/${currentUser.userId}`).on('child_added', snap => {
    const inv = snap.val();
    if (!inv) return;
    const key = snap.key;
    showInviteToast(inv, key);
  });
}

function showInviteToast(inv, key) {
  // Remove existing toasts
  document.querySelectorAll('.invite-toast').forEach(el => el.remove());
  const toast = document.createElement('div');
  toast.className = 'invite-toast';
  toast.innerHTML = `
    <div style="font-size:13px;"><strong>${escapeHtml(inv.fromName)}</strong> invited you to</div>
    <div style="font-family:'Fredoka One',cursive;font-size:16px;color:#a29bfe;margin:4px 0;">${escapeHtml(inv.roomName)}</div>
    <div class="invite-actions">
      <button class="invite-accept" id="inv-accept">Join</button>
      <button class="invite-decline" id="inv-decline">Decline</button>
    </div>`;
  document.body.appendChild(toast);
  document.getElementById('inv-accept').onclick = () => {
    toast.remove();
    // Do NOT remove the invite here — joinRoom() consumes it atomically after
    // verifying ban/kick status. Removing first would make joinRoom reject us.
    db.ref('rooms/' + key + '/banned/' + currentUser.userId).once('value', snap => {
      if (snap.val()) {
        appendSystemMessage('You are banned from that room.');
        db.ref('invites/' + currentUser.userId + '/' + key).remove();
      } else {
        joinRoom(key, inv.roomName);
      }
    });
  };
  document.getElementById('inv-decline').onclick = () => {
    toast.remove();
    db.ref('invites/' + currentUser.userId + '/' + key).remove();
  };
  // Auto-dismiss after 15s
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 15000);
}

// Listen for being kicked
function listenKicked(roomId) {
  if (roomId === LOBBY_ID) return;
  db.ref(`rooms/${roomId}/kicked/${currentUser.userId}`).on('value', snap => {
    if (snap.val()) {
      // Keep the kick flag so they can't silently rejoin; joinRoom checks it.
      localStorage.removeItem('av_lastRoom');
      localStorage.removeItem('av_lastRoomName');
      // Go back to lobby
      joinRoom(LOBBY_ID, 'Lobby');
      appendSystemMessage('You were kicked from the room.');
    }
  });
}

function appendSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  messagesContainer.appendChild(div);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Send message
const MSG_MAX_LEN = 500;
const MSG_COOLDOWN_MS = 700;
let _lastSendAt = 0;
function sendMessage() {
  if (_isBanned) return;
  let text = msgInput.value.trim();
  if (!text) return;
  // Client-side rate limit (best-effort; server rules are authoritative)
  const now = Date.now();
  if (now - _lastSendAt < MSG_COOLDOWN_MS) {
    return;
  }
  // Hard length cap (UI maxlength can be bypassed)
  if (text.length > MSG_MAX_LEN) text = text.slice(0, MSG_MAX_LEN);
  if (containsProfanity(text)) {
    banUser(text);
    return;
  }
  _lastSendAt = now;
  msgInput.value = '';
  db.ref(`rooms/${currentRoomId}/messages`).push({
    userId: currentUser.userId,
    username: currentUser.username,
    text: text,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).catch(err => {
    console.warn('Send failed:', err);
    appendSystemMessage('Message failed to send. Please try again.');
    _lastSendAt = 0; // allow retry
  });
}
sendBtn.onclick = sendMessage;
msgInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

// Cleanup on leave - remove from all rooms
window.addEventListener('beforeunload', () => {
  if (currentUser.userId) {
    userRooms.forEach(rid => {
      db.ref(`rooms/${rid}/members/${currentUser.userId}`).remove();
    });
  }
});

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Init
function initChat() {
  userDisplay.textContent = currentUser.username;
  lobbyCleanup();
  ensureLobby();
  listenRooms();
  listenInvites();
  listenHorns();
  // Rejoin last room if user didn't explicitly leave, otherwise lobby
  setTimeout(() => {
    const lastRoom = localStorage.getItem('av_lastRoom');
    const lastRoomName = localStorage.getItem('av_lastRoomName');
    if (lastRoom && lastRoom !== LOBBY_ID) {
      // Verify room still exists before rejoining
      db.ref(`rooms/${lastRoom}`).once('value', snap => {
        if (snap.exists()) {
          joinRoom(lastRoom, lastRoomName || snap.val().name || lastRoom);
        } else {
          localStorage.removeItem('av_lastRoom');
          localStorage.removeItem('av_lastRoomName');
          joinRoom(LOBBY_ID, 'Lobby');
        }
      });
    } else {
      joinRoom(LOBBY_ID, 'Lobby');
    }
  }, 800);
}

// Startup — prefer anonymous auth (so Firebase can tie writes to auth.uid if
// rules are later tightened), but fall back gracefully if anonymous sign-in
// is disabled on the project.
function bootWithIdentity(authUid) {
  if (loadUser()) {
    if (authUid) {
      currentUser.userId = authUid;           // prefer Firebase uid
      saveUser(authUid, currentUser.username);
    }
    initChat();
  } else {
    showUsernameModal();
  }
}
let _authBooted = false;
function bootOnce(uid) {
  if (_authBooted) return;
  _authBooted = true;
  bootWithIdentity(uid);
}

try {
  firebase.auth().signInAnonymously()
    .then(() => {
      firebase.auth().onAuthStateChanged(user => {
        if (user && user.uid) bootOnce(user.uid);
      });
    })
    .catch(err => {
      // Most common: Anonymous sign-in disabled on the Firebase project.
      // Continue without an auth uid — rules currently don't require one.
      console.warn('Anonymous auth unavailable:', err && err.code);
      bootOnce(null);
    });
  // Safety: if auth hangs, boot anyway after 3s using the locally stored id.
  setTimeout(() => bootOnce(null), 3000);
} catch (e) {
  console.warn('Auth init threw:', e);
  bootOnce(null);
}
</script>

<script>
(function() {
  function updateAdPadding() {
    var anchor = document.getElementById('adAnchor');
    if (!anchor) return;
    // Measure the anchor div itself
    var h = anchor.getBoundingClientRect().height;
    // Also check the ins element inside in case it's taller
    var ins = anchor.querySelector('ins');
    if (ins) h = Math.max(h, ins.getBoundingClientRect().height);
    // Minimum of 10px (just the padding), clamp to reasonable max
    h = Math.max(h, 10);
    document.documentElement.style.setProperty('--ad-anchor-height', h + 'px');
    // Also set directly on body as fallback
    document.body.style.paddingBottom = h + 'px';
  }

  // Run immediately and at multiple checkpoints
  updateAdPadding();
  document.addEventListener('DOMContentLoaded', updateAdPadding);
  window.addEventListener('load', updateAdPadding);
  window.addEventListener('resize', updateAdPadding);

  // Poll for the first 10 seconds to catch lazy-loaded ads
  var polls = 0;
  var interval = setInterval(function() {
    updateAdPadding();
    if (++polls >= 20) clearInterval(interval); // stop after 10s
  }, 500);

  // ResizeObserver on both the container and ins element
  var ro = null;
  if (window.ResizeObserver) {
    ro = new ResizeObserver(updateAdPadding);
    var anchor = document.getElementById('adAnchor');
    if (anchor) {
      ro.observe(anchor);
      var ins = anchor.querySelector('ins');
      if (ins) ro.observe(ins);
    }
  }
  // Clean up on page hide to avoid leaks
  window.addEventListener('pagehide', function() {
    try { if (ro) ro.disconnect(); } catch (e) {}
    try { clearInterval(interval); } catch (e) {}
  });
})();
</script>
