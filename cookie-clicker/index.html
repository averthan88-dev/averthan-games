<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:#0a0a1a; color:#fff; min-height:100vh; overflow:hidden; }
.home-btn { position:fixed; top:16px; left:16px; z-index:100; text-decoration:none; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:8px 16px; color:#fff; font-weight:700; font-size:14px; transition:all .2s; }
.home-btn:hover { background:rgba(108,92,231,0.3); border-color:#6c5ce7; }
#app { display:flex; flex-direction:column; height:calc(100vh - var(--ad-anchor-height, 0px)); }
#main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; min-height:0; }
#shop { width:100%; background:rgba(255,255,255,0.03); border-top:1px solid rgba(255,255,255,0.1); padding:10px 16px; flex-shrink:0; }
.shop-inner { display:flex; flex-direction:row; gap:10px; overflow-x:auto; overflow-y:hidden; padding-bottom:4px; scrollbar-width:thin; scrollbar-color:rgba(108,92,231,0.4) transparent; }
.shop-inner::-webkit-scrollbar { height:4px; }
.shop-inner::-webkit-scrollbar-thumb { background:rgba(108,92,231,0.4); border-radius:4px; }
.shop-title { font-family:'Fredoka One',cursive; font-size:1em; margin-bottom:6px; background:linear-gradient(135deg,#6c5ce7,#a29bfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
#score-bar { display:flex; align-items:center; justify-content:center; gap:20px; padding:8px 20px 8px 80px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
.cookie-count { font-family:'Fredoka One',cursive; font-size:1.8em; background:linear-gradient(135deg,#fdcb6e,#e17055); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.cps { color:rgba(255,255,255,0.45); font-size:0.85em; font-weight:600; }
.score-area { display:none; }
#cookie { width:220px; height:220px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #d4a574, #8B6914); cursor:pointer; position:relative; transition:transform 0.1s; user-select:none; -webkit-user-select:none; box-shadow:0 0 40px rgba(212,165,116,0.3), inset 0 -8px 16px rgba(0,0,0,0.3), inset 0 4px 8px rgba(255,255,255,0.2); }
#cookie:active { transform:scale(0.93); }
#cookie .chip { position:absolute; width:18px; height:16px; background:radial-gradient(circle, #5D3A1A, #3D2010); border-radius:50%; }
#cookie .chip:nth-child(1){top:35px;left:55px;} #cookie .chip:nth-child(2){top:60px;left:130px;} #cookie .chip:nth-child(3){top:105px;left:70px;} #cookie .chip:nth-child(4){top:90px;left:150px;} #cookie .chip:nth-child(5){top:145px;left:110px;} #cookie .chip:nth-child(6){top:55px;left:85px;transform:scale(0.8);} #cookie .chip:nth-child(7){top:130px;left:55px;transform:scale(0.7);}
#particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.upgrade { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:10px 14px; flex-shrink:0; width:140px; cursor:pointer; transition:all .2s; }
.upgrade:hover { background:rgba(108,92,231,0.15); border-color:rgba(108,92,231,0.4); }
.upgrade.cant-afford { opacity:0.4; cursor:default; }
.upgrade .u-top { display:flex; justify-content:space-between; align-items:center; }
.upgrade .u-name { font-weight:800; font-size:1em; }
.upgrade .u-count { background:rgba(108,92,231,0.3); border-radius:8px; padding:2px 10px; font-size:0.85em; font-weight:700; }
.upgrade .u-desc { color:rgba(255,255,255,0.4); font-size:0.8em; margin-top:4px; }
.upgrade .u-cost { color:#fdcb6e; font-weight:700; font-size:0.9em; margin-top:6px; }
.upgrade .u-icon { font-size:1.4em; margin-right:8px; }
#golden { position:absolute; width:60px; height:60px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #FFD700, #B8860B); cursor:pointer; display:none; z-index:50; box-shadow:0 0 20px rgba(255,215,0,0.6); animation:goldenPulse 0.5s ease-in-out infinite alternate; }
@keyframes goldenPulse { from{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.6)} to{transform:scale(1.1);box-shadow:0 0 40px rgba(255,215,0,0.9)} }
#golden .g-chip { position:absolute; width:10px; height:9px; background:radial-gradient(circle,#8B6914,#5D3A1A); border-radius:50%; }
#golden .g-chip:nth-child(1){top:12px;left:15px;} #golden .g-chip:nth-child(2){top:25px;left:35px;} #golden .g-chip:nth-child(3){top:38px;left:20px;}
.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#6c5ce7,#a29bfe); padding:12px 24px; border-radius:14px; font-weight:700; font-size:0.95em; z-index:200; animation:toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; box-shadow:0 8px 24px rgba(108,92,231,0.4); white-space:nowrap; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-20px)} }
.cookie-rain { position:fixed; font-size:24px; animation:rain linear forwards; pointer-events:none; z-index:10; }
@keyframes rain { from{transform:translateY(-40px) rotate(0deg);opacity:1} to{transform:translateY(100vh) rotate(360deg);opacity:0} }
.bonus-active { color:#FFD700; font-weight:800; animation:bonusPulse 0.5s ease-in-out infinite alternate; }
@keyframes bonusPulse { from{opacity:0.7} to{opacity:1} }
.reset-btn { background:rgba(255,100,100,0.15); border:1px solid rgba(255,100,100,0.3); color:#ff6b6b; border-radius:10px; padding:8px 16px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85em; margin-top:16px; width:100%; transition:all .2s; }
.reset-btn:hover { background:rgba(255,100,100,0.3); }
.float-text { position:absolute; font-weight:800; pointer-events:none; animation:floatUp 1s ease-out forwards; z-index:60; }
@keyframes floatUp { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-80px)} }
@media (max-width:500px) {
  #cookie { width:160px; height:160px; }
  #cookie .chip { width:14px; height:12px; }
  #cookie .chip:nth-child(1){top:25px;left:40px;} #cookie .chip:nth-child(2){top:45px;left:95px;} #cookie .chip:nth-child(3){top:75px;left:50px;} #cookie .chip:nth-child(4){top:65px;left:110px;} #cookie .chip:nth-child(5){top:105px;left:80px;} #cookie .chip:nth-child(6){top:40px;left:62px;} #cookie .chip:nth-child(7){top:95px;left:40px;}
  .cookie-count { font-size:2em; }
}
</style>

<body>
<div class="ad-container ad-top">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1414495127165303" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>

<div id="app">
  <div id="score-bar">
    <span>🍪</span>
    <div class="cookie-count" id="cookieCount">0</div>
    <div class="cps" id="cpsDisplay">0 / sec</div>
    <div class="cps bonus-active" id="bonusDisplay" style="display:none">🌟 10x BONUS!</div>
  </div>
  <div id="main">
    <canvas id="particles"></canvas>
    <div id="cookie">
      <div class="chip"></div><div class="chip"></div><div class="chip"></div><div class="chip"></div><div class="chip"></div><div class="chip"></div><div class="chip"></div>
    </div>
    <div id="golden" onclick="clickGolden()">
      <div class="g-chip"></div><div class="g-chip"></div><div class="g-chip"></div>
    </div>
  </div>
  <div id="shop">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div class="shop-title" style="margin-bottom:0">🍪 Cookie Shop</div>
      <button class="reset-btn" style="margin-top:0;width:auto;padding:4px 12px;font-size:0.75em;" onclick="resetGame()">🗑️ Reset</button>
    </div>
    <div class="shop-inner" id="upgradeList"></div>
  </div>
</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playSound(freq, type, dur, vol=0.15) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function clickSound() { playSound(800,'sine',0.08,0.12); playSound(1200,'sine',0.06,0.08); }
function goldenSound() { [800,1000,1200,1400].forEach((f,i) => setTimeout(()=>playSound(f,'sine',0.15,0.1),i*80)); }
function buySound() { playSound(600,'triangle',0.1,0.1); playSound(900,'triangle',0.1,0.08); }
function achieveSound() { [523,659,784].forEach((f,i) => setTimeout(()=>playSound(f,'sine',0.2,0.12),i*100)); }

const upgrades = [
  { name:'Auto Clicker', icon:'👆', desc:'+1 cookie/sec', baseCost:15, cps:1 },
  { name:'Grandma', icon:'👵', desc:'+5 cookies/sec', baseCost:100, cps:5 },
  { name:'Bakery', icon:'🏪', desc:'+20 cookies/sec', baseCost:500, cps:20 },
  { name:'Factory', icon:'🏭', desc:'+100 cookies/sec', baseCost:3000, cps:100 },
  { name:'Magic Oven', icon:'✨', desc:'+500 cookies/sec', baseCost:15000, cps:500 },
  { name:'Cookie Planet', icon:'🪐', desc:'+2000 cookies/sec', baseCost:100000, cps:2000 },
  { name:'Double Click', icon:'🖱️', desc:'2x click power', baseCost:500, cps:0, clickMult:2 },
  { name:'Golden Touch', icon:'👑', desc:'5x click power', baseCost:50000, cps:0, clickMult:5 },
];

function defaultState() {
  return { cookies:0, totalCookies:0, clickPower:1, owned:upgrades.map(()=>0), cps:0 };
}
// Always start fresh — no save/load between sessions
let state = defaultState();
function saveState() {
  // Only report score to Hall of Fame, don't persist between sessions
  if (typeof avReportScore === 'function') avReportScore('cookie-clicker', Math.floor(state.totalCookies));
}

function calcCPS() {
  let total = 0;
  upgrades.forEach((u,i) => { if(u.cps) total += u.cps * state.owned[i]; });
  state.cps = total;
}
function calcClickPower() {
  let p = 1;
  upgrades.forEach((u,i) => { if(u.clickMult && state.owned[i]>0) p *= u.clickMult; });
  state.clickPower = p;
}
function getCost(i) { return Math.floor(upgrades[i].baseCost * Math.pow(1.15, state.owned[i])); }

function fmt(n) {
  if(n >= 1e12) return (n/1e12).toFixed(1)+'T';
  if(n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1000) return n.toLocaleString('en-US');
  return Math.floor(n).toString();
}

const cookieEl = document.getElementById('cookie');
const countEl = document.getElementById('cookieCount');
const cpsEl = document.getElementById('cpsDisplay');
const bonusEl = document.getElementById('bonusDisplay');
const goldenEl = document.getElementById('golden');
const listEl = document.getElementById('upgradeList');
const mainEl = document.getElementById('main');

// Particles canvas
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];
function resizeCanvas() { pCanvas.width = mainEl.offsetWidth; pCanvas.height = mainEl.offsetHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function spawnParticles(x, y, count, color) {
  for(let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*4;
    particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2, life:1, color, size:3+Math.random()*4 });
  }
}
function updateParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
    if(p.life<=0) return false;
    pCtx.globalAlpha = p.life;
    pCtx.fillStyle = p.color;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size,0,Math.PI*2); pCtx.fill();
    return true;
  });
  pCtx.globalAlpha = 1;
}

// Click handler
cookieEl.addEventListener('click', (e) => {
  initAudio(); clickSound();
  const mult = bonusActive ? 10 : 1;
  const earned = state.clickPower * mult;
  state.cookies += earned;
  state.totalCookies += earned;
  // Float text
  const ft = document.createElement('div');
  ft.className = 'float-text';
  ft.textContent = '+' + fmt(earned);
  ft.style.color = bonusActive ? '#FFD700' : '#fdcb6e';
  ft.style.fontSize = earned > 10 ? '1.4em' : '1.1em';
  const rect = cookieEl.getBoundingClientRect();
  ft.style.left = (rect.left + rect.width/2 - 20 + (Math.random()-0.5)*60) + 'px';
  ft.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(ft);
  setTimeout(()=>ft.remove(), 1000);
  // Particles
  const cr = cookieEl.getBoundingClientRect();
  const mr = mainEl.getBoundingClientRect();
  spawnParticles(cr.left - mr.left + cr.width/2, cr.top - mr.top + cr.height/2, 6, '#d4a574');
  // Bounce
  cookieEl.style.transform = 'scale(0.9)';
  setTimeout(()=> cookieEl.style.transform = 'scale(1.05)', 50);
  setTimeout(()=> cookieEl.style.transform = '', 150);
  checkMilestones();
  updateDisplay();
});

// Shop
function renderShop() {
  listEl.innerHTML = '';
  upgrades.forEach((u,i) => {
    const cost = getCost(i);
    const canAfford = state.cookies >= cost;
    const isClickUpgrade = u.clickMult && state.owned[i] > 0;
    const div = document.createElement('div');
    div.className = 'upgrade' + (canAfford && !isClickUpgrade ? '' : ' cant-afford');
    div.innerHTML = `
      <div class="u-top">
        <span><span class="u-icon">${u.icon}</span><span class="u-name">${u.name}</span></span>
        <span class="u-count">${state.owned[i]}</span>
      </div>
      <div class="u-desc">${u.desc}</div>
      <div class="u-cost">${isClickUpgrade ? '✅ Owned' : '🍪 ' + fmt(cost)}</div>
    `;
    if(canAfford && !isClickUpgrade) {
      div.addEventListener('click', () => {
        initAudio(); buySound();
        state.cookies -= cost;
        state.owned[i]++;
        calcCPS(); calcClickPower();
        renderShop(); updateDisplay();
      });
    }
    listEl.appendChild(div);
  });
}

// Golden cookie
let bonusActive = false;
let goldenTimer = null;
function scheduleGolden() {
  const delay = (30 + Math.random()*30)*1000;
  goldenTimer = setTimeout(showGolden, delay);
}
function showGolden() {
  const rect = mainEl.getBoundingClientRect();
  goldenEl.style.left = (40 + Math.random()*(rect.width-140)) + 'px';
  goldenEl.style.top = (80 + Math.random()*(rect.height-200)) + 'px';
  goldenEl.style.display = 'block';
  setTimeout(()=>{ goldenEl.style.display='none'; scheduleGolden(); }, 8000);
}
function clickGolden() {
  initAudio(); goldenSound();
  goldenEl.style.display = 'none';
  if(Math.random() < 0.5) {
    // Bonus CPS
    bonusActive = true;
    bonusEl.style.display = 'block';
    startCookieRain();
    setTimeout(()=>{ bonusActive = false; bonusEl.style.display = 'none'; }, 10000);
  } else {
    // Instant bonus
    const bonus = Math.max(state.cps * 60, 100);
    state.cookies += bonus;
    state.totalCookies += bonus;
    showToast('🍪 +' + fmt(bonus) + ' cookies!');
  }
  scheduleGolden();
  updateDisplay();
}
function startCookieRain() {
  let count = 0;
  const interval = setInterval(()=>{
    if(count++ > 30 || !bonusActive) { clearInterval(interval); return; }
    const c = document.createElement('div');
    c.className = 'cookie-rain';
    c.textContent = '🍪';
    c.style.left = Math.random()*100+'%';
    c.style.animationDuration = (2+Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4000);
  }, 200);
}

// Milestones
const milestones = [1,100,1000,10000,100000,1e6,1e9,1e12];
const milestoneNames = ['First Cookie!','Cookie Beginner','Cookie Baker','Cookie Master','Cookie Tycoon','Cookie Millionaire','Cookie Billionaire','Cookie Trillionaire'];
let reachedMilestones = [];
function checkMilestones() {
  milestones.forEach((m,i) => {
    if(state.totalCookies >= m && !reachedMilestones.includes(i)) {
      reachedMilestones.push(i);
      // milestones tracked in-memory only
      showToast('🏆 ' + milestoneNames[i]);
      initAudio(); achieveSound();
    }
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

function updateDisplay() {
  countEl.textContent = fmt(state.cookies);
  const mult = bonusActive ? 10 : 1;
  cpsEl.textContent = fmt(state.cps * mult) + ' cookies per second';
}

function resetGame() {
  if(confirm('Reset ALL progress? This cannot be undone!')) {
    state = defaultState();
    reachedMilestones = [];
    // nothing to clear — no persistence between sessions
    calcCPS(); calcClickPower(); renderShop(); updateDisplay();
    showToast('Progress reset!');
  }
}

// CPS tick
setInterval(()=>{
  if(state.cps > 0) {
    const mult = bonusActive ? 10 : 1;
    const earned = state.cps * mult / 20;
    state.cookies += earned;
    state.totalCookies += earned;
    checkMilestones();
    updateDisplay();
    renderShop();
  }
}, 50);

// Auto-save
setInterval(saveState, 5000);

// Animation loop
function animate() {
  updateParticles();
  requestAnimationFrame(animate);
}

// Init
calcCPS(); calcClickPower(); renderShop(); updateDisplay(); scheduleGolden(); animate();
</script>

<script>
/* AdSense anchor offset — dynamically shift content above sticky footer ad */
(function(){
  function updateAdPadding(){
    var el=document.querySelector('.ad-anchor');
    if(!el)return;
    var h=el.getBoundingClientRect().height||el.offsetHeight;
    var ins=el.querySelector('ins');
    if(ins)h=Math.max(h,ins.getBoundingClientRect().height||0);
    h=Math.max(h,0);
    document.documentElement.style.setProperty('--ad-anchor-height',h+'px');
    document.body.style.paddingBottom=h+'px';
  }
  updateAdPadding();
  document.addEventListener('DOMContentLoaded',updateAdPadding);
  window.addEventListener('load',updateAdPadding);
  window.addEventListener('resize',updateAdPadding);
  var polls=0,iv=setInterval(function(){updateAdPadding();if(++polls>=20)clearInterval(iv);},500);
  if(window.ResizeObserver){
    var ro=new ResizeObserver(updateAdPadding);
    var el=document.querySelector('.ad-anchor');
    if(el){ro.observe(el);var ins=el.querySelector('ins');if(ins)ro.observe(ins);}
  }
})();
</script>
