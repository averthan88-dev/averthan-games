<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a1a;--card:rgba(255,255,255,0.05);--text:#fff;--sub:rgba(255,255,255,0.7);
--purple:#6c5ce7;--lpurple:#a29bfe;--pink:#fd79a8;--teal:#00cec9;--green:#55efc4;
--orange:#e17055;--emerald:#00b894;--magenta:#e84393;--yellow:#fdcb6e;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
h1,h2,h3,.title-font{font-family:'Fredoka One',cursive}

/* Main Menu Button */
.main-menu-btn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.7);color:#fff;text-decoration:none;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:700;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);transition:all .3s}
.main-menu-btn:hover{background:rgba(108,92,231,0.6);transform:scale(1.05)}

/* Sound Toggle */
.sound-toggle{position:fixed;top:12px;right:12px;z-index:9999;background:rgba(0,0,0,0.7);color:#fff;border:1px solid rgba(255,255,255,0.1);padding:8px 14px;border-radius:20px;font-size:18px;cursor:pointer;backdrop-filter:blur(10px);transition:all .3s}
.sound-toggle:hover{background:rgba(108,92,231,0.6)}

/* Progress Bar */
.progress-bar-container{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1);z-index:9998}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal),var(--green));transition:width .5s ease;border-radius:0 2px 2px 0}

/* Screens */
.screen{display:none;padding:60px 20px 30px;max-width:1000px;margin:0 auto;animation:fadeIn .5s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.3) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fillBar{from{width:0}to{width:var(--fill)}}
@keyframes drawCircle{from{stroke-dashoffset:314}to{stroke-dashoffset:var(--target)}}

/* Title */
.app-title{font-size:clamp(2.5rem,6vw,4rem);text-align:center;margin:20px 0 5px;background:linear-gradient(135deg,var(--purple),var(--pink),var(--teal),var(--green),var(--purple));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientMove 4s ease infinite}
.app-subtitle{text-align:center;color:var(--sub);font-size:1.1rem;margin-bottom:30px;font-weight:600}
.overall-progress{text-align:center;margin-bottom:30px}
.overall-progress .bar{width:80%;max-width:400px;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;margin:8px auto;overflow:hidden}
.overall-progress .fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--green));border-radius:5px;transition:width .8s ease}
.overall-progress span{font-size:.9rem;color:var(--sub)}

/* Topic Grid */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}
.topic-card{background:var(--card);border-radius:20px;padding:24px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);transition:all .3s;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent);border-radius:20px 20px 0 0}
.topic-card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,0.2);box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.topic-card .emoji{font-size:2.5rem;margin-bottom:10px;display:inline-block;animation:float 3s ease-in-out infinite}
.topic-card h3{font-size:1.2rem;margin-bottom:6px}
.topic-card p{color:var(--sub);font-size:.85rem;margin-bottom:12px}
.topic-card .card-progress{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.topic-card .card-progress-fill{height:100%;border-radius:2px;transition:width .5s}
.topic-card .check{position:absolute;top:12px;right:12px;font-size:1.5rem}
.topic-card:nth-child(odd) .emoji{animation-delay:.5s}

/* Topic View */
.topic-header{display:flex;align-items:center;gap:15px;margin-bottom:20px;flex-wrap:wrap}
.topic-header .back-btn{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:10px 18px;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:700;transition:all .3s}
.topic-header .back-btn:hover{background:rgba(255,255,255,0.2)}
.topic-header h2{font-size:1.8rem;flex:1}
.slide-dots{display:flex;gap:6px;justify-content:center;margin:15px 0}
.slide-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all .3s;cursor:pointer}
.slide-dots .dot.active{background:var(--accent);transform:scale(1.3)}
.slide-dots .dot.completed{background:rgba(255,255,255,0.5)}

/* Slide Content */
.slide-container{min-height:400px;animation:fadeIn .4s ease}
.slide-card{background:var(--card);border-radius:20px;padding:30px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);margin-bottom:20px}
.slide-card h3{font-size:1.4rem;margin-bottom:15px;display:flex;align-items:center;gap:10px}
.slide-card .narration{color:var(--sub);font-style:italic;margin-bottom:20px;font-size:.95rem;padding:10px 15px;border-left:3px solid var(--accent);background:rgba(255,255,255,0.02);border-radius:0 8px 8px 0}

/* Visual Area */
.visual-area{background:rgba(0,0,0,0.3);border-radius:16px;padding:20px;margin:20px 0;min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden}
.visual-area canvas{border-radius:12px;max-width:100%}
.visual-area svg{max-width:100%}

/* Interactive Elements */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.choice-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);color:#fff;padding:14px 18px;border-radius:14px;cursor:pointer;font-size:1rem;font-weight:600;transition:all .3s;font-family:'Nunito',sans-serif}
.choice-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3)}
.choice-btn.correct{background:rgba(85,239,196,0.2);border-color:var(--green);animation:bounceIn .4s}
.choice-btn.wrong{background:rgba(253,121,168,0.2);border-color:var(--pink);animation:shake .4s}
.choice-btn:disabled{cursor:not-allowed;opacity:.7}

.number-input{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);color:#fff;padding:12px 16px;border-radius:12px;font-size:1.2rem;width:120px;text-align:center;font-family:'Nunito',sans-serif;outline:none;transition:border-color .3s}
.number-input:focus{border-color:var(--accent)}
.submit-btn{background:linear-gradient(135deg,var(--purple),var(--lpurple));border:none;color:#fff;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:700;transition:all .3s;font-family:'Nunito',sans-serif;margin-left:10px}
.submit-btn:hover{transform:scale(1.05);box-shadow:0 5px 20px rgba(108,92,231,0.4)}

.slider-control{width:100%;margin:10px 0}
.slider-control input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.2);outline:none}
.slider-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff}

/* Navigation */
.slide-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
.nav-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:12px 24px;border-radius:14px;cursor:pointer;font-size:1rem;font-weight:700;transition:all .3s;font-family:'Nunito',sans-serif}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,0.2);transform:scale(1.03)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.primary{background:linear-gradient(135deg,var(--accent,var(--purple)),rgba(255,255,255,0.2));border:none}

/* Quiz */
.quiz-header{text-align:center;margin-bottom:20px}
.quiz-header h3{font-size:1.6rem}
.quiz-question-num{color:var(--sub);font-size:.9rem}
.quiz-score{text-align:center;padding:30px}
.stars{display:flex;justify-content:center;gap:15px;margin:20px 0}
.stars .star{font-size:3rem;opacity:.2;transition:all .5s}
.stars .star.earned{opacity:1;animation:starPop .5s ease forwards}
.stars .star:nth-child(2).earned{animation-delay:.2s}
.stars .star:nth-child(3).earned{animation-delay:.4s}
.score-text{font-size:2rem;font-weight:800;margin:15px 0}
.retry-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:14px 32px;border-radius:16px;cursor:pointer;font-size:1.1rem;font-weight:700;font-family:'Nunito',sans-serif;margin-top:15px;transition:all .3s}
.retry-btn:hover{transform:scale(1.05)}

/* Number Line */
.number-line{position:relative;height:60px;margin:20px 0}
.number-line .line{position:absolute;top:50%;left:5%;right:5%;height:3px;background:rgba(255,255,255,0.4);border-radius:2px}
.number-line .tick{position:absolute;top:50%;width:2px;height:16px;background:rgba(255,255,255,0.6);transform:translateX(-50%) translateY(-50%)}
.number-line .label{position:absolute;top:70%;font-size:.75rem;transform:translateX(-50%);color:var(--sub)}
.number-line .marker{position:absolute;top:20%;font-size:1.2rem;transform:translateX(-50%);transition:left .5s ease;z-index:2}

/* Fraction Bars */
.fraction-bar{display:flex;height:40px;border-radius:8px;overflow:hidden;margin:8px 0;border:2px solid rgba(255,255,255,0.2)}
.fraction-bar .segment{flex:1;border-right:1px solid rgba(255,255,255,0.15);transition:background .3s}
.fraction-bar .segment:last-child{border:none}
.fraction-bar .segment.filled{background:var(--accent)}
.fraction-bar .segment.empty{background:rgba(255,255,255,0.05)}

/* Algebra Tiles */
.algebra-tiles{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0}
.tile{width:50px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;transition:all .3s}
.tile.x-tile{background:rgba(108,92,231,0.4);border:2px solid var(--purple)}
.tile.num-tile{background:rgba(85,239,196,0.3);border:2px solid var(--green)}
.tile.neg-tile{background:rgba(253,121,168,0.3);border:2px solid var(--pink)}

/* Balance Scale */
.balance-scale{display:flex;align-items:flex-end;justify-content:center;gap:20px;margin:20px 0;min-height:150px}
.scale-side{background:rgba(255,255,255,0.06);border-radius:12px;padding:15px;min-width:120px;text-align:center;border:2px solid rgba(255,255,255,0.1);transition:all .3s;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scale-side.balanced{border-color:var(--green);box-shadow:0 0 20px rgba(85,239,196,0.2)}
.scale-equals{font-size:2rem;font-weight:800;align-self:center}

/* Geometry Drawing */
.geo-canvas{background:rgba(0,0,0,0.4);border-radius:12px;border:1px solid rgba(255,255,255,0.1)}

/* Pie Chart */
.pie-container{position:relative;width:200px;height:200px;margin:0 auto}

/* Stats */
.stat-row{display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap}
.stat-bar{flex:1;height:24px;background:rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;min-width:100px}
.stat-bar .fill{height:100%;border-radius:12px;transition:width 1s ease;display:flex;align-items:center;padding:0 8px;font-size:.75rem;font-weight:700}

/* Shopping Sim */
.product-card{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin:8px 0;display:flex;align-items:center;gap:15px;border:1px solid rgba(255,255,255,0.08)}
.product-card .price{font-size:1.3rem;font-weight:800;color:var(--green)}
.product-card .unit-price{font-size:.85rem;color:var(--sub)}

/* Responsive */
@media(max-width:600px){
  .choices{grid-template-columns:1fr}
  .topic-grid{grid-template-columns:1fr}
  .slide-card{padding:20px}
  .balance-scale{flex-direction:column;align-items:center}
  .scale-equals{transform:rotate(90deg)}
}

/* Feedback */
.feedback{padding:12px 16px;border-radius:12px;margin:10px 0;font-weight:700;animation:fadeIn .3s}
.feedback.correct{background:rgba(85,239,196,0.15);color:var(--green);border:1px solid rgba(85,239,196,0.3)}
.feedback.wrong{background:rgba(253,121,168,0.15);color:var(--pink);border:1px solid rgba(253,121,168,0.3)}
.feedback.info{background:rgba(108,92,231,0.15);color:var(--lpurple);border:1px solid rgba(108,92,231,0.3)}

/* Coin/Dice */
.coin{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f9ca24,#f0932b);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#2d3436;cursor:pointer;transition:transform .3s;margin:10px auto;box-shadow:0 4px 15px rgba(249,202,36,0.3)}
.coin:hover{transform:scale(1.1)}
.coin.flipping{animation:spin .5s ease}
.dice{width:70px;height:70px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#2d3436;cursor:pointer;margin:10px auto;box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:transform .3s}
.dice:hover{transform:scale(1.1)}
.dice.rolling{animation:shake .3s}

/* Highlights */
.highlight{background:rgba(108,92,231,0.2);padding:2px 8px;border-radius:6px;font-weight:700}
.step{padding:8px 12px;margin:4px 0;border-radius:8px;transition:all .4s}
.step.active{background:rgba(108,92,231,0.2);border-left:3px solid var(--accent)}
.step.done{opacity:.5}

/* Metric Ladder */
.metric-ladder{display:flex;flex-direction:column;align-items:center;gap:4px;margin:15px 0}
.ladder-step{padding:8px 20px;border-radius:10px;font-weight:700;font-size:1rem;transition:all .4s;min-width:120px;text-align:center}
.ladder-step.active{transform:scale(1.15);box-shadow:0 0 20px rgba(85,239,196,0.3)}
.ladder-arrow{font-size:1.2rem;color:var(--sub)}

.interactive-hint{color:var(--sub);font-size:.85rem;text-align:center;margin-top:8px;font-style:italic}
</style>

<script>
// ===== TTS CONFIG =====
const XI_API_KEY = 'sk_829c7c66b4f149beb858b00101142d9aca349e29ad67e218';
const XI_VOICE_ID = 'hpp4J3VqNfWAUOO0d1Us';
const XI_MODEL = 'eleven_v3';
const voiceCache = new Map();
let soundEnabled = true;
let currentAudio = null;

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled && currentAudio) { currentAudio.pause(); currentAudio = null; }
}

async function speak(text) {
  if (!soundEnabled || !text) return;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const key = text.substring(0, 100);
  if (voiceCache.has(key)) {
    playBlob(voiceCache.get(key)); return;
  }
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${XI_VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': XI_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model_id: XI_MODEL, voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
    });
    if (!res.ok) throw new Error('API fail');
    const blob = await res.blob();
    voiceCache.set(key, blob);
    playBlob(blob);
  } catch (e) { speakFallback(text); }
}

function playBlob(blob) {
  const url = URL.createObjectURL(blob);
  currentAudio = new Audio(url);
  currentAudio.play().catch(() => {});
}

function speakFallback(text) {
  if (!soundEnabled) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95; u.pitch = 1.05;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(e) {}
}

// ===== PROGRESS =====
function getProgress() {
  try { return JSON.parse(localStorage.getItem('smartermath_progress') || '{}'); } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('smartermath_progress', JSON.stringify(p)); }
function markTopicComplete(id) {
  const p = getProgress(); p[id] = true; saveProgress(p); updateProgressUI();
}
function updateProgressUI() {
  const p = getProgress();
  const done = topics.filter(t => p[t.id]).length;
  const pct = Math.round((done / topics.length) * 100);
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('homeProgressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} of ${topics.length} topics completed`;
  document.querySelectorAll('.topic-card').forEach((card, i) => {
    const check = card.querySelector('.check');
    if (p[topics[i].id]) { check.textContent = '✅'; card.querySelector('.card-progress-fill').style.width = '100%'; }
  });
}

// ===== UTILITY =====
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = rand(0, i); [b[i], b[j]] = [b[j], b[i]]; } return b; }
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

// ===== TOPIC NAVIGATION =====
let currentTopic = null;
let currentSlide = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('homeScreen');
  buildHome();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
}

function openTopic(idx) {
  currentTopic = idx;
  currentSlide = 0;
  const t = topics[idx];
  document.getElementById('topicTitle').innerHTML = `${t.emoji} ${t.title}`;
  document.getElementById('topicScreen').style.setProperty('--accent', t.accent);
  showScreen('topicScreen');
  buildDots();
  renderSlide();
}

function buildDots() {
  const dots = document.getElementById('slideDots');
  const t = topics[currentTopic];
  dots.innerHTML = '';
  t.slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentSlide ? ' active' : '');
    d.style.setProperty('--accent', t.accent);
    d.onclick = () => { currentSlide = i; renderSlide(); buildDots(); };
    dots.appendChild(d);
  });
}

function prevSlide() {
  if (currentSlide > 0) { currentSlide--; renderSlide(); buildDots(); }
}

function nextSlide() {
  const t = topics[currentTopic];
  if (currentSlide < t.slides.length - 1) { currentSlide++; renderSlide(); buildDots(); }
}

function renderSlide() {
  const t = topics[currentTopic];
  const s = t.slides[currentSlide];
  const container = document.getElementById('slideContainer');
  const counter = document.getElementById('slideCounter');
  counter.textContent = `${currentSlide + 1} / ${t.slides.length}`;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === t.slides.length - 1;
  document.getElementById('nextBtn').style.background = `linear-gradient(135deg,${t.accent},rgba(255,255,255,0.15))`;

  container.style.animation = 'none';
  container.offsetHeight;
  container.style.animation = 'fadeIn .4s ease';

  if (s.isQuiz) {
    renderQuiz(container, t);
  } else {
    renderContent(container, t, currentSlide);
  }
  speak(s.voice);
}

function renderIntegerLine(vis, inter, accent) {
  const val = rand(-8, 8);

    <div class="number-line" style="height:80px">
      <div class="line"></div>
      ${Array.from({length:21},(_, i) => {
        const n = i - 10;
        const pct = 5 + (i/20)*90;
        return `<div class="tick" style="left:${pct}%"></div><div class="label" style="left:${pct}%">${n}</div>`;
      }).join('')}
      <div class="marker" id="nlMarker" style="left:${5+((val+10)/20)*90}%">📍</div>
    </div>
    <p style="text-align:center;margin-top:30px;font-size:1.2rem">The marker is at: <strong style="color:${accent}">${val}</strong></p>
  </div>`;

  const target = rand(-10, 10);
  inter.innerHTML = `<p style="margin:10px 0">Move to the integer <strong>${target}</strong>:</p>
    <div class="slider-control"><input type="range" min="-10" max="10" value="0" id="nlSlider"></div>
    <p id="nlValue" style="text-align:center;font-size:1.3rem;font-weight:800">0</p>
    <button class="submit-btn" onclick="checkNL(${target})">Check Answer</button>
    <div id="nlFeedback"></div>`;
  document.getElementById('nlSlider').oninput = function() {
    document.getElementById('nlValue').textContent = this.value;
    const marker = document.getElementById('nlMarker');
    marker.style.left = (5 + ((parseInt(this.value)+10)/20)*90) + '%';
  };
}
function checkNL(target) {
  const v = parseInt(document.getElementById('nlSlider').value);
  const fb = document.getElementById('nlFeedback');
  fb.className = 'feedback ' + (v === target ? 'correct' : 'wrong');
  fb.textContent = v === target ? '✅ Correct! Great job!' : `❌ Not quite. The answer is ${target}. Try again!`;
}

function renderIntegerOps(vis, inter, accent) {
  const a = rand(-8, 8), b = rand(-8, 8);
  const op = Math.random() > 0.5 ? '+' : '-';
  const answer = op === '+' ? a + b : a - b;
  vis.innerHTML = `<div style="text-align:center">
    <p style="font-size:2rem;font-weight:800;margin:20px">(${a}) ${op} (${b}) = ?</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:15px 0">
      ${a > 0 ? Array(a).fill('<div class="tile num-tile">+1</div>').join('') : Array(Math.abs(a)).fill('<div class="tile neg-tile">-1</div>').join('')}
    </div>
    <p style="color:var(--sub)">${op === '+' ? 'Adding' : 'Subtracting'} ${b > 0 ? b + ' positive' : Math.abs(b) + ' negative'} chips</p>
  </div>`;
  const opts = shuffle([answer, answer + rand(1,3), answer - rand(1,3), answer + rand(-5,5)]).slice(0,4);
  if (!opts.includes(answer)) opts[0] = answer;
  inter.innerHTML = `<div class="choices">${opts.map(o =>
    `<button class="choice-btn" onclick="checkChoice(this,${o===answer})">${o}</button>`
  ).join('')}</div><div id="intFB"></div>`;
}

function renderFractions(vis, inter, accent) {
  const d = [2,3,4,5,6,8][rand(0,5)];
  const n = rand(1, d-1);
  vis.innerHTML = `<div style="width:100%;max-width:400px">
    <p style="text-align:center;font-size:1.5rem;font-weight:800;margin-bottom:15px">${n}/${d}</p>
    <div class="fraction-bar" style="--accent:${accent}">
      ${Array.from({length:d},(_, i) => `<div class="segment ${i < n ? 'filled' : 'empty'}" style="background:${i < n ? accent : 'rgba(255,255,255,0.05)'}"></div>`).join('')}
    </div>
    <p style="text-align:center;color:var(--sub);margin-top:10px">${n} out of ${d} parts are filled</p>
  </div>`;

  const d2 = [2,3,4,5,6][rand(0,4)], n2 = rand(1, d2);
  const cd = (d * d2) / gcd(d, d2);
  const sum_n = n*(cd/d) + n2*(cd/d2);
  const g = gcd(sum_n, cd);
  inter.innerHTML = `<p style="margin:10px 0"><strong>Add: ${n}/${d} + ${n2}/${d2}</strong></p>
    <p style="color:var(--sub)">Common denominator: ${cd}</p>
    <p style="color:var(--sub)">${n*(cd/d)}/${cd} + ${n2*(cd/d2)}/${cd} = ${sum_n}/${cd}${g>1?' = '+sum_n/g+'/'+cd/g:''}</p>
    <div class="feedback info" style="margin-top:10px">Answer: <strong>${sum_n/g}/${cd/g}</strong></div>`;
}

function renderBEDMAS(vis, inter, accent) {
  const a = rand(2,6), b = rand(1,4), c = rand(2,5), d = rand(1,3);

  vis.innerHTML = `<div style="text-align:center;width:100%">

      <div class="step active"><strong>D</strong>iv/<strong>M</strong>ul: ${b} × ${c} = ${step1}</div>
      <div class="step active"><strong>A</strong>dd: ${a} + ${step1} = ${step2}</div>
      <div class="step active"><strong>S</strong>ub: ${step2} - ${d} = <strong style="color:${accent}">${result}</strong></div>
    </div>
  </div>`;

  const x = rand(1,5), y = rand(2,4), z = rand(1,3), w = rand(1,5);
  const expr2 = `(${x} + ${y}) × ${z} + ${w}`;

window.flipCoin = function() {
  const coin = document.getElementById('coin');
  coin.classList.add('flipping');
  setTimeout(() => {
    const h = Math.random() < 0.5;
    coin.textContent = h ? 'H' : 'T';
    coin.classList.remove('flipping');
    if (h) window._coinH++; else window._coinT++;
    document.getElementById('coinStats').textContent = `H: ${window._coinH} | T: ${window._coinT}`;
  }, 500);
};

window.rollDice = function() {
  const dice = document.getElementById('dice');
  dice.classList.add('rolling');
  setTimeout(() => {
    const v = rand(1, 6);
    dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][v-1];
    dice.classList.remove('rolling');
    window._diceFreq[v]++;
    document.getElementById('diceStats').textContent = Object.entries(window._diceFreq).map(([k,v])=>`${k}:${v}`).join(' ');
  }, 300);
};

function renderExpVsTheo(vis, inter, accent) {
  vis.innerHTML = `<div style="text-align:center;width:100%">
    <p style="font-size:1.2rem;font-weight:700;margin-bottom:10px">Coin Flip Experiment</p>
    <p style="color:var(--sub)">Theoretical probability of heads = 50%</p>
    <div style="margin:15px 0">
      <button class="submit-btn" id="runExp" onclick="runExperiment()">Flip 10 Coins</button>
      <button class="submit-btn" onclick="runExperiment100()" style="margin-left:5px">Flip 100</button>
    </div>
    <div id="expResults"></div>
    <p id="expNote" style="color:var(--sub);font-size:.9rem;margin-top:10px"></p>
  </div>`;
  window._expTotal = 0; window._expHeads = 0;
  inter.innerHTML = `<div class="feedback info">As we do more flips, the experimental probability gets closer to the theoretical probability of 50%. This is called the Law of Large Numbers!</div>`;
}

window.runExperiment = function() {
  let h = 0;
  for (let i = 0; i < 10; i++) if (Math.random() < 0.5) h++;
  window._expTotal += 10;
  window._expHeads += h;
  updateExpDisplay();
};
window.runExperiment100 = function() {
  let h = 0;
  for (let i = 0; i < 100; i++) if (Math.random() < 0.5) h++;
  window._expTotal += 100;
  window._expHeads += h;
  updateExpDisplay();
};
function updateExpDisplay() {
  const pct = ((window._expHeads / window._expTotal) * 100).toFixed(1);
  document.getElementById('expResults').innerHTML = `
    <p style="font-size:1.3rem;font-weight:800">Heads: ${window._expHeads}/${window._expTotal} = <span style="color:#55efc4">${pct}%</span></p>
    <div class="stat-bar" style="max-width:300px;margin:10px auto"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,#6c5ce7,#00cec9)"></div></div>
    <div style="width:2px;height:24px;background:#fd79a8;position:relative;left:50%;top:-24px"></div>`;
  document.getElementById('expNote').textContent = `After ${window._expTotal} flips: ${Math.abs(parseFloat(pct)-50) < 5 ? 'Very close to 50%!' : 'Keep flipping to get closer to 50%!'}`;
}

// ===== ANSWER CHECKING =====
function checkChoice(btn, correct) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  if (correct) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    parent.querySelectorAll('.choice-btn').forEach(b => {
      if (b.onclick && b.onclick.toString().includes('true')) b.classList.add('correct');
    });
    // Find correct one
    setTimeout(() => {
      parent.querySelectorAll('.choice-btn').forEach(b => {
        const handler = b.getAttribute('onclick') || '';
        if (handler.includes(',true)')) b.classList.add('correct');
      });
    }, 100);
  }
}

function checkSimple(inputId, answer, fbId) {
  const v = parseFloat(document.getElementById(inputId).value);
  const fb = document.getElementById(fbId);
  fb.className = 'feedback ' + (v === answer ? 'correct' : 'wrong');
  fb.textContent = v === answer ? '✅ Correct! Excellent work!' : `❌ Not quite. The answer is ${answer}`;
}

function checkClose(inputId, answer, fbId, tolerance) {
  const v = parseFloat(document.getElementById(inputId).value);
  const fb = document.getElementById(fbId);
  const correct = Math.abs(v - answer) <= tolerance;
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  fb.textContent = correct ? '✅ Correct! Great job!' : `❌ Not quite. The answer is ${answer}`;
}

// ===== QUIZ SYSTEM =====
function renderQuiz(container, topic) {
  const accent = topic.accent;
  if (!window._quizState || window._quizState.topicId !== topic.id) {
    window._quizState = {
      topicId: topic.id,
      questions: generateQuizQuestions(topic.id),
      current: 0,
      score: 0,
      answered: false
    };
  }
  const qs = window._quizState;
  if (qs.current >= qs.questions.length) {
    renderQuizResults(container, topic);
    return;
  }
  const q = qs.questions[qs.current];
  container.innerHTML = `<div class="slide-card" style="--accent:${accent}">
    <div class="quiz-header">
      <h3 style="color:${accent}">🎯 ${topic.title} Quiz</h3>
      <p class="quiz-question-num">Question ${qs.current + 1} of ${qs.questions.length}</p>
      <div style="display:flex;gap:6px;justify-content:center;margin:10px 0">
        ${qs.questions.map((_,i) => `<div style="width:30px;height:4px;border-radius:2px;background:${i<qs.current?accent:i===qs.current?'white':'rgba(255,255,255,0.2)'}"></div>`).join('')}
      </div>
    </div>
    <p style="font-size:1.2rem;font-weight:700;margin:20px 0">${q.question}</p>
    <div class="choices" id="quizChoices">
      ${q.choices.map((c, i) => `<button class="choice-btn" onclick="answerQuiz(${i})">${c}</button>`).join('')}
    </div>
    <div id="quizFB"></div>
  </div>`;
}

window.answerQuiz = function(idx) {
  const qs = window._quizState;
  if (qs.answered) return;
  qs.answered = true;
  const q = qs.questions[qs.current];
  const btns = document.querySelectorAll('#quizChoices .choice-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    qs.score++;
    document.getElementById('quizFB').innerHTML = '<div class="feedback correct">✅ Correct!</div>';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    document.getElementById('quizFB').innerHTML = `<div class="feedback wrong">❌ The correct answer is: ${q.choices[q.correct]}</div>`;
  }

  setTimeout(() => {
    qs.current++;
    qs.answered = false;
    const t = topics[currentTopic];
    if (qs.current >= qs.questions.length) {
      renderQuizResults(document.getElementById('slideContainer'), t);
    } else {
      renderQuiz(document.getElementById('slideContainer'), t);
    }
  }, 1800);
};

function renderQuizResults(container, topic) {
  const qs = window._quizState;
  const pct = (qs.score / qs.questions.length) * 100;
  const stars = pct >= 100 ? 3 : pct >= 60 ? 2 : 1;

  if (pct >= 60) markTopicComplete(topic.id);
  if (typeof avReportScore === 'function') avReportScore('smarter-math', qs.score, {topic: topic.id, total: qs.questions.length, pct: Math.round(pct)});

  container.innerHTML = `<div class="slide-card quiz-score" style="--accent:${topic.accent}">
    <h3 style="color:${topic.accent}">Quiz Complete!</h3>
    <div class="stars">
      <div class="star ${stars >= 1 ? 'earned' : ''}">⭐</div>
      <div class="star ${stars >= 2 ? 'earned' : ''}">⭐</div>
      <div class="star ${stars >= 3 ? 'earned' : ''}">⭐</div>
    </div>
    <p class="score-text" style="color:${topic.accent}">${qs.score} / ${qs.questions.length}</p>
    <p style="color:var(--sub)">${pct >= 100 ? 'Perfect score! Amazing!' : pct >= 60 ? 'Great job! Topic completed!' : 'Keep practicing, you\'ll get there!'}</p>
    <button class="retry-btn" onclick="retryQuiz()">Try Again</button>
    <button class="retry-btn" style="background:rgba(255,255,255,0.1);margin-left:10px" onclick="goHome()">Back to Topics</button>
  </div>`;

  speak(pct >= 100 ? 'Perfect score! You are a math superstar!' : pct >= 60 ? 'Great job! You passed the quiz!' : 'Keep practicing and you will master this topic!');
}

window.retryQuiz = function() {

      let p1={qty:6,cost:12},p2={qty:10,cost:15};
      let best=p1.cost/p1.qty < p2.cost/p2.qty ? 'A' : 'B';
      qs.push({question:`A: ${p1.qty} for $${p1.cost} vs B: ${p2.qty} for $${p2.cost}. Best deal?`,choices:shuffle(['A ($'+(p1.cost/p1.qty).toFixed(2)+'/ea)','B ($'+(p2.cost/p2.qty).toFixed(2)+'/ea)']),correct:undefined});
      qs[4].correct=qs[4].choices.findIndex(c=>c.startsWith(best));

      return qs;
    }
  };

  return (generators[topicId] || generators.numbers)();
}

buildHome();
