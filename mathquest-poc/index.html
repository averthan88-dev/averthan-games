<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathQuest 🧮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --card-bg: rgba(255,255,255,0.95);
    --correct: #00c853;
    --wrong: #ff1744;
    --gold: #ffd700;
    --btn-primary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --btn-green: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    --btn-blue: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --btn-orange: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    --btn-purple: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 20px;
    text-align: center;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── TITLE SCREEN ── */
  .title-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 3.2em;
    color: white;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    margin-bottom: 5px;
  }
  .title-sub {
    font-size: 1.2em;
    color: rgba(255,255,255,0.85);
    margin-bottom: 30px;
  }
  .title-mascot {
    font-size: 80px;
    margin-bottom: 20px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .menu-btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border: none;
    border-radius: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3em;
    color: white;
    cursor: pointer;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
  .menu-btn:active { transform: translateY(1px); }
  .btn-adventure { background: var(--btn-green); }
  .btn-speed { background: var(--btn-blue); }
  .btn-practice { background: var(--btn-orange); }

  /* ── DIFFICULTY SELECT ── */
  .diff-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2em;
    color: white;
    margin-bottom: 20px;
  }
  .diff-btn {
    display: block;
    width: 100%;
    padding: 18px;
    margin: 12px 0;
    border: none;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1em;
    font-weight: 700;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: transform 0.15s;
  }
  .diff-btn:hover { transform: translateY(-2px); }
  .diff-btn .emoji { font-size: 1.5em; display: block; margin-bottom: 4px; }
  .diff-easy { background: var(--btn-green); }
  .diff-medium { background: var(--btn-blue); }
  .diff-hard { background: var(--btn-orange); }
  .diff-expert { background: var(--btn-primary); }

  /* Subject cards */
  .subject-btn {
    display: block;
    width: 100%;
    padding: 20px;
    margin: 12px 0;
    border: none;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1em;
    font-weight: 700;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 25px rgba(0,0,0,0.2);
    transition: transform 0.15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .subject-btn:hover { transform: translateY(-3px); }
  .subject-btn .subj-icon {
    font-size: 2.5em;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
  }
  .subject-btn .subj-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4em;
    margin-bottom: 4px;
  }
  .subject-btn .subj-desc {
    font-size: 0.85em;
    opacity: 0.85;
  }
  .subj-arithmetic {
    background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
  }
  .subj-algebra {
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
  }
  .subj-geometry {
    background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
  }
  .subj-finance {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
  }
  .subj-mixed {
    background: linear-gradient(135deg, #eb3349 0%, #f45c43 50%, #ffd200 100%);
  }

  /* ── GAME SCREEN ── */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    color: white;
  }
  .score-display, .timer-display, .streak-display {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2em;
  }
  .streak-display { color: var(--gold); }

  .problem-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 30px 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  .world-label {
    font-size: 0.9em;
    color: #888;
    margin-bottom: 5px;
  }
  .problem-text {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2em;
    color: #333;
    margin: 10px 0;
    word-break: break-word;
    line-height: 1.2;
  }
  .problem-text.small-text {
    font-size: 1.4em;
  }
  .problem-diagram {
    margin: 0 auto 10px;
    display: none;
  }
  .problem-diagram.show {
    display: block;
  }
  .problem-diagram svg {
    max-width: 100%;
    height: auto;
  }
  /* ── SOLUTION BREAKDOWN ── */
  .solution-breakdown {
    display: none;
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 12px;
    text-align: left;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .solution-breakdown.show { display: block; animation: fadeSlideIn 0.4s ease; }
  .solution-step {
    font-family: 'Nunito', sans-serif;
    font-size: 1.05em;
    color: #333;
    padding: 4px 0;
    opacity: 0;
    animation: stepReveal 0.4s ease forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .solution-step .step-icon {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: white;
  }
  .step-start .step-icon { background: #5b6abf; }
  .step-work .step-icon { background: #e67e22; }
  .step-result .step-icon { background: #27ae60; }
  .solution-step .step-text {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05em;
  }
  .step-text .highlight { color: #e74c3c; font-weight: 900; }
  .step-text .op { color: #e67e22; }
  .solution-label {
    font-size: 0.75em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes stepReveal {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes drawShape {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulseIn {
    0% { opacity: 0; transform: scale(0.5); }
    60% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }
  .problem-hint {
    font-size: 0.85em;
    color: #aaa;
    margin-top: 8px;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 15px;
  }
  .answer-btn {
    padding: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    font-family: 'Fredoka One', cursive;
    font-size: 1.8em;
    color: white;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(5px);
  }
  .answer-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .answer-btn.correct {
    background: var(--correct) !important;
    border-color: var(--correct);
    animation: pop 0.3s ease;
  }
  .answer-btn.wrong {
    background: var(--wrong) !important;
    border-color: var(--wrong);
    animation: shake 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .progress-bar {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--btn-green);
    border-radius: 6px;
    transition: width 0.5s ease;
  }

  /* ── FEEDBACK OVERLAY ── */
  .feedback {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    pointer-events: none;
  }
  .feedback.show { display: flex; }
  .feedback-text {
    font-family: 'Fredoka One', cursive;
    font-size: 3em;
    animation: feedbackPop 0.8s ease forwards;
  }
  @keyframes feedbackPop {
    0% { transform: scale(0); opacity: 0; }
    40% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 0; }
  }

  /* ── RESULTS SCREEN ── */
  .results-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  .results-trophy { font-size: 80px; margin-bottom: 10px; }
  .results-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2em;
    color: #333;
  }
  .results-stats {
    margin: 20px 0;
    font-size: 1.1em;
    color: #555;
  }
  .results-stats div { margin: 8px 0; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 900; color: #333; }
  .stars { font-size: 2.5em; margin: 15px 0; }

  .back-btn {
    display: inline-block;
    padding: 14px 40px;
    margin-top: 15px;
    border: none;
    border-radius: 16px;
    background: var(--btn-purple);
    font-family: 'Fredoka One', cursive;
    font-size: 1.2em;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    animation: particleFly 1s ease forwards;
    z-index: 200;
  }
  @keyframes particleFly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
  }

  /* ── CONFETTI / FIREWORKS ── */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 250;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
  }
  .firework {
    position: fixed;
    pointer-events: none;
    z-index: 260;
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: fireworkBurst ease-out forwards;
  }
  @keyframes fireworkBurst {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.2); }
  }
  .celebration-text {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Fredoka One', cursive;
    font-size: 2.5em;
    color: white;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    pointer-events: none;
    z-index: 270;
    animation: celebPop 1.2s ease forwards;
  }
  @keyframes celebPop {
    0% { transform: translate(-50%,-50%) scale(0) rotate(-10deg); opacity: 0; }
    30% { transform: translate(-50%,-50%) scale(1.3) rotate(5deg); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.8) rotate(0deg); opacity: 0; }
  }

  /* ── COMBO ── */
  .combo-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Fredoka One', cursive;
    font-size: 2em;
    color: var(--gold);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    pointer-events: none;
    animation: comboFlash 0.8s ease forwards;
    z-index: 150;
  }
  @keyframes comboFlash {
    0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
    30% { transform: translate(-50%,-50%) scale(1.4); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }

  /* ── PROFILE CARDS ── */
  .profile-card {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px; padding: 14px 16px;
    margin: 8px 0; cursor: pointer;
    transition: all 0.15s; text-align: left;
  }
  .profile-card:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
  .profile-card .pc-avatar { font-size: 2.2em; }
  .profile-card .pc-info { flex: 1; }
  .profile-card .pc-name { font-family: 'Fredoka One', cursive; font-size: 1.2em; }
  .profile-card .pc-stats { font-size: 0.8em; color: rgba(255,255,255,0.7); }
  .profile-card .pc-delete {
    font-size: 1.2em; opacity: 0.4; cursor: pointer; padding: 4px 8px;
    border-radius: 8px; border: none; background: none; color: white;
  }
  .profile-card .pc-delete:hover { opacity: 1; background: rgba(255,68,68,0.3); }

  .avatar-pick {
    font-size: 2.2em; padding: 8px; cursor: pointer;
    border-radius: 12px; border: 3px solid transparent;
    transition: all 0.15s; background: rgba(255,255,255,0.1);
  }
  .avatar-pick:hover { background: rgba(255,255,255,0.2); }
  .avatar-pick.selected { border-color: #ffd700; background: rgba(255,215,0,0.2); transform: scale(1.15); }

  .player-stats-bar {
    display: flex; justify-content: center; gap: 16px;
    margin: 10px 0 16px; flex-wrap: wrap;
  }
  .stat-chip {
    background: rgba(255,255,255,0.12);
    border-radius: 12px; padding: 6px 14px;
    font-size: 0.85em; font-weight: 700;
  }
  .stat-chip .stat-num { font-family: 'Fredoka One', cursive; color: #ffd700; }

  /* Sound toggle */
  .sound-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    z-index: 300;
  }
</style>
</head>
<body>

<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

<div class="container">

  <!-- PROFILE SELECT SCREEN -->
  <div class="screen active" id="profileScreen">
    <div class="title-mascot">🦊</div>
    <div class="title-logo">MathQuest</div>
    <div class="title-sub">Who's playing today?</div>
    <div id="profileList"></div>
    <button class="menu-btn" style="background:var(--btn-green);margin-top:16px" onclick="showNewProfile()">➕ New Player</button>
  </div>

  <!-- NEW PROFILE SCREEN -->
  <div class="screen" id="newProfileScreen">
    <div class="diff-title">What's your name?</div>
    <div style="margin:20px 0">
      <input type="text" id="newNameInput" placeholder="Type your name..." maxlength="20"
        style="width:100%;padding:16px;border-radius:16px;border:3px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-family:'Fredoka One',cursive;font-size:1.3em;text-align:center;outline:none;" />
    </div>
    <div class="diff-title" style="font-size:1.2em;margin-bottom:10px">Pick your avatar!</div>
    <div id="avatarGrid" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px"></div>
    <button class="menu-btn btn-adventure" onclick="createProfile()">Let's Go! 🚀</button>
    <button class="menu-btn" style="background:rgba(255,255,255,0.2);margin-top:8px" onclick="showScreen('profileScreen');loadProfiles()">← Back</button>
  </div>

  <!-- TITLE SCREEN -->
  <div class="screen" id="titleScreen">
    <div class="title-mascot" id="playerAvatar">🦊</div>
    <div class="title-logo">MathQuest</div>
    <div class="title-sub">Welcome back, <span id="playerNameDisplay">Explorer</span>!</div>
    <div class="player-stats-bar" id="playerStatsBar"></div>
    <button class="menu-btn btn-adventure" onclick="showSubject('adventure')">🏰 Adventure Mode</button>
    <button class="menu-btn btn-speed" onclick="showSubject('speed')">⚡ Speed Run (60s)</button>
    <button class="menu-btn btn-practice" onclick="showSubject('practice')">📝 Free Practice</button>
    <button class="menu-btn" style="background:rgba(255,255,255,0.15);margin-top:8px;font-size:1em" onclick="showScreen('profileScreen');loadProfiles()">👥 Switch Player</button>
  </div>

  <!-- SUBJECT SELECT -->
  <div class="screen" id="subjectScreen">
    <div class="diff-title">Pick a Subject!</div>
    <button class="subject-btn subj-arithmetic" onclick="pickSubject('arithmetic')">
      <div class="subj-icon">🔢</div>
      <div class="subj-title">Arithmetic</div>
      <div class="subj-desc">Add, Subtract, Multiply, Divide</div>
    </button>
    <button class="subject-btn subj-algebra" onclick="pickSubject('algebra')">
      <div class="subj-icon">🔤</div>
      <div class="subj-title">Algebra</div>
      <div class="subj-desc">Solve for x, Equations, Patterns</div>
    </button>
    <button class="subject-btn subj-geometry" onclick="pickSubject('geometry')">
      <div class="subj-icon">📐</div>
      <div class="subj-title">Geometry</div>
      <div class="subj-desc">Shapes, Area, Perimeter, Angles</div>
    </button>
    <button class="subject-btn subj-finance" onclick="pickSubject('finance')">
      <div class="subj-icon">💰</div>
      <div class="subj-title">Money & Finance</div>
      <div class="subj-desc">Budgets, Interest, Savings, Real Life!</div>
    </button>
    <button class="subject-btn subj-mixed" onclick="pickSubject('mixed')">
      <div class="subj-icon">🎲</div>
      <div class="subj-title">Mixed Challenge</div>
      <div class="subj-desc">All subjects combined!</div>
    </button>
    <button class="menu-btn" style="background:rgba(255,255,255,0.2);margin-top:16px" onclick="showScreen('titleScreen')">← Back</button>
  </div>

  <!-- DIFFICULTY SELECT -->
  <div class="screen" id="difficultyScreen">
    <div class="diff-title">Pick Your Level!</div>
    <div id="difficultyButtons"></div>
    <button class="menu-btn" style="background:rgba(255,255,255,0.2);margin-top:20px" onclick="showScreen('subjectScreen')">← Back</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    <div class="game-header">
      <div class="score-display">⭐ <span id="score">0</span></div>
      <div class="streak-display">🔥 <span id="streak">0</span></div>
      <div class="timer-display" id="timerDisplay"></div>
    </div>
    <div class="problem-card">
      <div class="world-label" id="worldLabel"></div>
      <div class="problem-diagram" id="problemDiagram"></div>
      <div class="problem-text" id="problemText">2 + 3</div>
      <div class="problem-hint" id="problemHint"></div>
    </div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="solution-breakdown" id="solutionBreakdown"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="menu-btn" style="background:rgba(255,255,255,0.2);margin-top:15px;font-size:1em;padding:12px" onclick="quitGame()">🚪 Quit</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="resultsScreen">
    <div class="results-card">
      <div class="results-trophy" id="resultsTrophy">🏆</div>
      <div class="results-title" id="resultsTitle">Amazing!</div>
      <div class="stars" id="resultsStars">⭐⭐⭐</div>
      <div class="results-stats">
        <div><span class="stat-label">Score:</span> <span class="stat-value" id="finalScore">0</span></div>
        <div><span class="stat-label">Correct:</span> <span class="stat-value" id="finalCorrect">0</span></div>

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let soundOn = true;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, duration, type = 'square', vol = 0.15) {
  if (!soundOn) return;
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

const XI_API_KEY = 'sk_939be73bcd0a9ef45fde7aadb962fb5c327addd2285c6df0';

const XI_MODEL = 'eleven_v3';

let currentAudio = null;
const audioCache = new Map(); // cache spoken phrases to save API calls
let speakResolve = null; // resolves when current speech ends

async function speak(text) {
  if (!soundOn) return Promise.resolve();

  // Stop any currently playing voice
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  return new Promise(async (resolve) => {
    function playBlob(url) {
      const audio = new Audio(url);
      currentAudio = audio;
      audio.onended = resolve;
      audio.onerror = resolve;
      audio.play().catch(resolve);
    }

    // Check cache first
    if (audioCache.has(text)) {
      playBlob(audioCache.get(text));
      return;
    }

    try {
      const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${XI_VOICE_ID}`, {
        method: 'POST',
        headers: {
          'xi-api-key': XI_API_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          text: text,
          model_id: XI_MODEL,
          voice_settings: {
            stability: 0.5,
            similarity_boost: 0.75,
            style: 0.4,
          },
        }),
      });

      if (!resp.ok) {
        console.warn('ElevenLabs TTS failed, falling back to browser speech');
        speakFallback(text);
        resolve();
        return;
      }

      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      audioCache.set(text, url);
      playBlob(url);
    } catch (e) {
      console.warn('ElevenLabs error:', e);
      speakFallback(text);
      resolve();
    }
  });
}

// Browser speech fallback if ElevenLabs fails
function speakFallback(text) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95;
  utter.pitch = 1.1;
  speechSynthesis.speak(utter);
}

}

}

function generateArithmetic() {

  var useWord = Math.random() < 0.5; // 50% chance of word problem

  switch(difficulty) {
    case 'k': { // Kindergarten
      a = rand(1, 5); b = rand(1, 5); answer = a + b;

      else { op = '+'; }
      break;
    }
    case 'g1': { // 1st
      if (Math.random() < 0.6) {
        a = rand(1,12); b = rand(1,8); answer = a+b;
        if(useWord){ var w=wordProblem(WORD_ADD,a,b); text=w.text; voice=w.voice; } else { op='+'; }
      } else {
        a = rand(5,18); b = rand(1,a-1); answer = a-b;
        if(useWord){ var w=wordProblem(WORD_SUB,a,b); text=w.text; voice=w.voice; } else { op='-'; }
      }
      break;
    }
    case 'g2': { // 2nd
      a = rand(10,80); b = rand(5,50); if(a<b){var t=a;a=b;b=t;}
      if(Math.random()<0.5) { answer=a+b; if(useWord){var w=wordProblem(WORD_ADD,a,b);text=w.text;voice=w.voice;}else{op='+';} }
      else { answer=a-b; if(useWord){var w=wordProblem(WORD_SUB,a,b);text=w.text;voice=w.voice;}else{op='-';} }
      break;
    }
    case 'g3': { // 3rd
      var r = Math.random();
      if (r < 0.3) { a=rand(2,10);b=rand(2,10);answer=a*b; if(useWord){var w=wordProblem(WORD_MUL,a,b);text=w.text;voice=w.voice;}else{op='×';} }
      else if (r < 0.55) { b=rand(2,10);answer=rand(1,10);a=b*answer; if(useWord){var w=wordProblem(WORD_DIV,a,b);text=w.text;voice=w.voice;}else{op='÷';} }
      else if (r < 0.75) { a=rand(10,60);b=rand(5,a);answer=a-b; if(useWord){var w=wordProblem(WORD_SUB,a,b);text=w.text;voice=w.voice;}else{op='-';} }
      else { var whole=rand(2,10)*2;answer=whole/2;text='½ of '+whole+' = ?';voice='What is one half of '+whole+'?'; }
      break;
    }
    case 'g4': { // 4th
      var r = Math.random();
      if (r < 0.2) { a=rand(12,99);b=rand(12,99);answer=a+b; if(useWord){var w=wordProblem(WORD_ADD,a,b);text=w.text;voice=w.voice;}else{op='+';} }
      else if (r < 0.35) { a=rand(50,200);b=rand(10,a);answer=a-b; if(useWord){var w=wordProblem(WORD_SUB,a,b);text=w.text;voice=w.voice;}else{op='-';} }
      else if (r < 0.5) { a=rand(3,12);b=rand(10,50);answer=a*b; if(useWord){var w=wordProblem(WORD_MUL,a,b);text=w.text;voice=w.voice;}else{op='×';} }
      else if (r < 0.65) { b=rand(3,12);answer=rand(3,20);a=b*answer; if(useWord){var w=wordProblem(WORD_DIV,a,b);text=w.text;voice=w.voice;}else{op='÷';} }
      else if (r < 0.8) { var d=[3,4,5][rand(0,2)];var whole=d*rand(2,8);answer=whole/d;text='1/'+d+' of '+whole+' = ?';voice='What is 1 '+d+'th of '+whole+'?'; }
      else { // word: multi-step
        a=rand(5,20);b=rand(3,10);var c=rand(1,5);answer=a+b-c;
        var nm=WORD_NAMES[rand(0,WORD_NAMES.length-1)];var it=WORD_ITEMS[rand(0,WORD_ITEMS.length-1)];
        text=a+' + '+b+' - '+c+' = ?';
        voice=nm+' has '+a+' '+it+', gets '+b+' more, then gives away '+c+'. How many now?';
      }
      break;
    }
    case 'g5': { // 5th
      var r = Math.random();
      if (r < 0.2) {
        a=rand(2,8);b=rand(1,5);var c=rand(1,10);answer=a*b+c;text=a+' × '+b+' + '+c+' = ?';voice='What is '+a+' times '+b+' plus '+c+'?';
      } else if (r < 0.35) {
        a=rand(2,8);b=rand(1,5);var c=rand(1,a*b);answer=a*b-c;text=a+' × '+b+' - '+c+' = ?';voice=a+' times '+b+' minus '+c+'?';
      } else if (r < 0.5) {
        a=rand(1,20);b=rand(1,9);var c=rand(1,20);var d2=rand(1,9);
        answer=parseFloat((a+b/10+c+d2/10).toFixed(1));text=a+'.'+b+' + '+c+'.'+d2+' = ?';voice=a+' point '+b+' plus '+c+' point '+d2+'?';
      } else if (r < 0.65) {
        var d=[4,5,6,8][rand(0,3)];var n1=rand(1,d-2);var n2=rand(1,d-n1);
        answer=n1+n2;text=n1+'/'+d+' + '+n2+'/'+d+' = ?/'+d;voice=n1+' '+d+'ths plus '+n2+' '+d+'ths. What is the numerator?';
      } else { // word: rate problem
        var rate=rand(2,8);var hours=rand(2,6);answer=rate*hours;
        var nm=WORD_NAMES[rand(0,WORD_NAMES.length-1)];
        text=rate+' × '+hours+' = ?';
        voice=nm+' earns '+rate+' dollars per hour. After '+hours+' hours, how much did they earn?';
      }
      break;
    }
    case 'g6': { // 6th
      var r = Math.random();
      if (r < 0.2) { var pct=[10,20,25,50,75][rand(0,4)];var n=rand(2,20)*(100/pct);answer=n*pct/100;text=pct+'% of '+n+' = ?';voice='What is '+pct+' percent of '+n+'?'; }
      else if (r < 0.35) { a=rand(-15,15);b=rand(-15,15);answer=a+b;text=(a<0?'('+a+')':''+a)+' + '+(b<0?'('+b+')':''+b)+' = ?';voice=a+' plus '+b+'?'; }
      else if (r < 0.5) { var g=rand(2,6);a=g*rand(1,5);b=g*rand(1,5);while(a===b)b=g*rand(1,5);answer=a/gcd(a,b);text='Simplify '+a+':'+b+' → ?:'+(b/gcd(a,b));voice='Simplify the ratio '+a+' to '+b+'. What is the first number?'; }
      else if (r < 0.65) { a=rand(-10,20);b=rand(-10,20);answer=a-b;text=(a<0?'('+a+')':''+a)+' - '+(b<0?'('+b+')':''+b)+' = ?';voice=a+' minus '+b+'?'; }
      else { // word: discount
        var price=rand(4,20)*5;var pct2=[10,20,25,50][rand(0,3)];var disc=price*pct2/100;answer=price-disc;
        var nm=WORD_NAMES[rand(0,WORD_NAMES.length-1)];
        text=price+' - '+pct2+'% = ?';
        voice='A shirt costs '+price+' dollars. It is '+pct2+' percent off. What is the sale price?';
      }
      break;
    }
    case 'g7': { // 7th
      var r = Math.random();
      if (r < 0.2) { a=rand(2,10);b=rand(2,3);answer=Math.pow(a,b);text=a+(b===2?'²':'³')+' = ?';voice=a+' to the power of '+b+'?'; }
      else if (r < 0.35) { var d1=rand(2,6);var n1=rand(1,d1-1);var mult=rand(2,5);var d2=d1*mult;answer=n1*mult;text=n1+'/'+d1+' = ?/'+d2;voice=n1+' over '+d1+' equals what over '+d2+'?'; }
      else if (r < 0.5) { var base=rand(5,20)*10;var pct=[10,20,25,50][rand(0,3)];answer=base+base*pct/100;text=base+' + '+pct+'% = ?';voice=base+' plus '+pct+' percent of itself?'; }
      else if (r < 0.65) { a=rand(-8,-1);b=rand(2,10);answer=a*b;text='('+a+') × '+b+' = ?';voice=a+' times '+b+'?'; }
      else { // word: tip
        var bill=rand(10,50)*2;var tipPct=[15,18,20][rand(0,2)];answer=bill*tipPct/100;
        text=tipPct+'% of '+bill+' = ?';
        voice='A restaurant bill is '+bill+' dollars. You leave a '+tipPct+' percent tip. How much is the tip?';
      }
      break;
    }
    case 'g8': { // 8th
      var r = Math.random();
      if (r < 0.2) { answer=rand(2,15);a=answer*answer;text='√'+a+' = ?';voice='What is the square root of '+a+'?'; }
      else if (r < 0.35) { answer=rand(2,8);a=answer*answer*answer;text='∛'+a+' = ?';voice='What is the cube root of '+a+'?'; }
      else if (r < 0.5) { a=rand(2,5);var m=rand(1,4);var n=rand(1,4);answer=m+n;text=a+'^'+m+' × '+a+'^'+n+' = '+a+'^?';voice=a+' to the '+m+' times '+a+' to the '+n+'. What is the exponent?'; }
      else if (r < 0.65) { var coef=rand(1,9);var exp=rand(2,5);answer=coef*Math.pow(10,exp);text=coef+' × 10^'+exp+' = ?';voice=coef+' times 10 to the '+exp+'?'; }
      else { // word: compound interest simplified
        var principal=rand(5,20)*100;var rate2=10;answer=principal*rate2/100;
        text=rate2+'% of '+principal+' = ?';
        voice='You invest '+principal+' dollars at '+rate2+' percent interest. How much interest do you earn in one year?';
      }
      break;
    }
    default:
      a=rand(1,10);b=rand(1,10);op='+';answer=a+b;
  }
  if (!text) text = a + ' ' + op + ' ' + b;
  correctAnswer = answer;
  return { text: text, answer: answer, voice: voice };
}

function gcd(a, b) { a=Math.abs(a); b=Math.abs(b); while(b){var t=b; b=a%b; a=t;} return a; }

// ── ALGEBRA (2nd through 8th) ──
function generateAlgebra() {
  let text, answer, voice, steps = [];
  switch(difficulty) {
    case 'g2': { // Missing number: _ + 3 = 7
      answer = rand(1, 10); let b = rand(1, 10); let c = answer + b;
      if (Math.random() < 0.5) {
        text = '? + ' + b + ' = ' + c; voice = 'What plus ' + b + ' equals ' + c + '?';
        steps = [{type:'start',text:'? + '+b+' = '+c},{type:'work',text:'? = '+c+' − '+b},{type:'result',text:'? = '+answer}];
      } else {
        text = c + ' - ? = ' + b; voice = c + ' minus what equals ' + b + '?';
        steps = [{type:'start',text:c+' − ? = '+b},{type:'work',text:'? = '+c+' − '+b},{type:'result',text:'? = '+answer}];
      }
      break;
    }
    case 'g3': { // unknowns with ×÷
      if (Math.random() < 0.5) {
        answer = rand(2,8); let b = rand(2,8); let c = answer * b;
        text = '? × ' + b + ' = ' + c; voice = 'What times ' + b + ' equals ' + c + '?';
        steps = [{type:'start',text:'? × '+b+' = '+c},{type:'work',text:'? = '+c+' ÷ '+b},{type:'result',text:'? = '+answer}];
      } else {
        let b = rand(2,8); answer = rand(2,8); let a = b * answer;
        text = a + ' ÷ ? = ' + answer; voice = a + ' divided by what equals ' + answer + '?';
        answer = b; // they need to find the divisor
        steps = [{type:'start',text:a+' ÷ ? = '+(a/b)},{type:'work',text:'? = '+a+' ÷ '+(a/b)},{type:'result',text:'? = '+answer}];
      }
      break;
    }
    case 'g4': { // one-step: x + 12 = 25 or x - 5 = 8
      answer = rand(3, 30); let b = rand(3, 25);
      if (Math.random() < 0.5) {
        let c = answer + b; text = 'x + ' + b + ' = ' + c; voice = 'x plus ' + b + ' equals ' + c + '. What is x?';
        steps = [{type:'start',text:'x + '+b+' = '+c},{type:'work',text:'x = '+c+' − '+b},{type:'result',text:'x = '+answer}];
      } else {
        let c = answer - b; if(c<0){let t=answer;answer=b;b=t;c=answer-b;}
        text = 'x - ' + b + ' = ' + c; voice = 'x minus ' + b + ' equals ' + c + '. What is x?';
        steps = [{type:'start',text:'x − '+b+' = '+c},{type:'work',text:'x = '+c+' + '+b},{type:'result',text:'x = '+answer}];
      }
      break;
    }
    case 'g5': { // two-step: ax + b = c
      let a = rand(2,5); answer = rand(1,10); let b = rand(1,15); let c = a*answer+b;
      text = a + 'x + ' + b + ' = ' + c; voice = a + ' x plus ' + b + ' equals ' + c + '. What is x?';
      steps = [{type:'start',text:a+'x + '+b+' = '+c},{type:'work',text:a+'x = '+c+' − '+b},{type:'work',text:a+'x = '+(c-b)},{type:'work',text:'x = '+(c-b)+' ÷ '+a},{type:'result',text:'x = '+answer}];
      break;
    }
    case 'g6': { // expressions, inequalities, patterns
      const r = Math.random();
      if (r < 0.35) { // ax - b = c
        let a = rand(2,6); answer = rand(2,10); let b = rand(1,15);
        let c = a*answer-b; if(c<0){b=rand(1,a*answer-1);c=a*answer-b;}
        text = a + 'x - ' + b + ' = ' + c; voice = a + ' x minus ' + b + ' equals ' + c + '. What is x?';
        steps = [{type:'start',text:a+'x − '+b+' = '+c},{type:'work',text:a+'x = '+c+' + '+b},{type:'work',text:a+'x = '+(c+b)},{type:'work',text:'x = '+(c+b)+' ÷ '+a},{type:'result',text:'x = '+answer}];
      } else if (r < 0.7) { // pattern: 2, 5, 8, 11, ?
        let start = rand(1,10); let step = rand(2,7); let seq = [];
        for(let i=0;i<4;i++)seq.push(start+step*i);
        answer = start+step*4; text = seq.join(', ') + ', ?'; voice = seq.join(', ') + '... what comes next?';
        steps = [{type:'start',text:seq.join(', ')+', ?'},{type:'work',text:'Pattern: +'+step+' each time'},{type:'work',text:seq[3]+' + '+step+' = ?'},{type:'result',text:'? = '+answer}];
      } else { // evaluate expression: 3(x+2) when x=4
        let a = rand(2,5); let b = rand(1,6); let x = rand(1,8);
        answer = a * (x + b); text = a + '(' + x + ' + ' + b + ') = ?'; voice = a + ' times the quantity ' + x + ' plus ' + b + '?';
        steps = [{type:'start',text:a+'('+x+' + '+b+') = ?'},{type:'work',text:a+' × '+(x+b)+' = ?'},{type:'result',text:'= '+answer}];
      }
      break;
    }
    case 'g7': { // multi-step, distributive
      const r = Math.random();
      if (r < 0.4) { // a(x+b) = c → solve for x
        let a = rand(2,5); answer = rand(1,8); let b = rand(1,6); let c = a*(answer+b);
        text = a + '(x + ' + b + ') = ' + c; voice = a + ' times x plus ' + b + ' in brackets equals ' + c + '. What is x?';
        steps = [{type:'start',text:a+'(x + '+b+') = '+c},{type:'work',text:'x + '+b+' = '+c+' ÷ '+a},{type:'work',text:'x + '+b+' = '+(c/a)},{type:'work',text:'x = '+(c/a)+' − '+b},{type:'result',text:'x = '+answer}];
      } else if (r < 0.7) { // ax + b = cx + d
        let a = rand(3,8); let c2 = rand(1,a-1); answer = rand(1,10);
        let b = rand(1,15); let d = (a-c2)*answer + b;
        text = a + 'x + ' + b + ' = ' + c2 + 'x + ' + d; voice = a + ' x plus ' + b + ' equals ' + c2 + ' x plus ' + d + '. What is x?';
        steps = [{type:'start',text:a+'x + '+b+' = '+c2+'x + '+d},{type:'work',text:(a-c2)+'x + '+b+' = '+d},{type:'work',text:(a-c2)+'x = '+(d-b)},{type:'work',text:'x = '+(d-b)+' ÷ '+(a-c2)},{type:'result',text:'x = '+answer}];
      } else { // geometric pattern: 1,4,9,16,? (squares)
        let type2 = rand(0,1);
        if(type2===0){ // squares
          answer = 25; text = '1, 4, 9, 16, ?'; voice = '1, 4, 9, 16... what comes next?';
          steps = [{type:'start',text:'1, 4, 9, 16, ?'},{type:'work',text:'Pattern: 1², 2², 3², 4²'},{type:'work',text:'5² = ?'},{type:'result',text:'? = 25'}];
        } else { // doubles
          answer = 64; text = '2, 4, 8, 16, 32, ?'; voice = '2, 4, 8, 16, 32... what comes next?';
          steps = [{type:'start',text:'2, 4, 8, 16, 32, ?'},{type:'work',text:'Pattern: ×2 each time'},{type:'work',text:'32 × 2 = ?'},{type:'result',text:'? = 64'}];
        }
      }
      break;
    }
    case 'g8': { // linear equations, slope, systems intro
      const r = Math.random();
      if (r < 0.3) { // slope: rise/run given two points
        let x1=rand(0,4),y1=rand(0,4),x2=rand(x1+1,8),y2=rand(0,8);
        while((y2-y1)%(x2-x1)!==0){y2=rand(0,8);} // clean slope
        answer = (y2-y1)/(x2-x1);
        text = 'Slope: ('+x1+','+y1+') → ('+x2+','+y2+')';
        voice = 'What is the slope from point '+x1+' '+y1+' to '+x2+' '+y2+'?';
        steps = [{type:'start',text:'slope = (y₂−y₁)÷(x₂−x₁)'},{type:'work',text:'= ('+y2+'−'+y1+')÷('+x2+'−'+x1+')'},{type:'work',text:'= '+(y2-y1)+'÷'+(x2-x1)},{type:'result',text:'slope = '+answer}];
      } else if (r < 0.6) { // y = mx + b, find y given x
        let m = rand(1,5); let b = rand(-5,10); let x = rand(1,6);
        answer = m*x+b;
        let bStr = b >= 0 ? ' + '+b : ' - '+Math.abs(b);
        text = 'y = '+m+'x'+bStr+', x='+x;
        voice = 'If y equals '+m+' x'+bStr+', what is y when x is '+x+'?';
        steps = [{type:'start',text:'y = '+m+'('+x+')'+bStr},{type:'work',text:'y = '+(m*x)+bStr},{type:'result',text:'y = '+answer}];
      } else { // solve with fractions: x/a + b = c
        let a = rand(2,6); answer = rand(2,8) * a; let b = rand(1,10); let c = answer/a + b;
        text = 'x/' + a + ' + ' + b + ' = ' + c; voice = 'x over ' + a + ' plus ' + b + ' equals ' + c + '. What is x?';
        steps = [{type:'start',text:'x/'+a+' + '+b+' = '+c},{type:'work',text:'x/'+a+' = '+(c-b)},{type:'work',text:'x = '+(c-b)+' × '+a},{type:'result',text:'x = '+answer}];
      }
      break;
    }
    default: { // fallback
      answer = rand(1,10); let b=rand(1,10); let c=answer+b;
      text = '? + '+b+' = '+c; voice = 'What plus '+b+' equals '+c+'?';
      steps=[{type:'start',text:text},{type:'work',text:'? = '+c+' − '+b},{type:'result',text:'? = '+answer}];
    }
  }
  correctAnswer = answer;
  return { text, answer, voice, steps };
}
