// ── GEOMETRY (1st through 8th) ──
function generateGeometry() {
  var text, answer, voice, diagram = null;
  var shapes = [
    {name:'triangle',sides:3},{name:'square',sides:4},{name:'rectangle',sides:4},
    {name:'pentagon',sides:5},{name:'hexagon',sides:6},{name:'octagon',sides:8}
  ];

  switch(difficulty) {
    case 'g1': case 'k': { // shapes & sides
      var s = shapes[rand(0, shapes.length-1)];
      answer = s.sides; text = 'How many sides?';
      voice = 'How many sides does a '+s.name+' have?';
      diagram = {type:'polygon', name:s.name, sides:s.sides};
      break;
    }
    case 'g3': case 'g2': { // perimeter
      var w=rand(2,12), h=rand(2,12);
      answer = 2*(w+h); text = 'Perimeter = ?';
      voice = 'What is the perimeter of a rectangle that is '+w+' by '+h+'?';
      diagram = {type:'rectangle', w:w, h:h, label:'perimeter'};
      break;
    }
    case 'g4': { // area of rectangles & triangles
      if (Math.random() < 0.5) {
        var w=rand(2,12), h=rand(2,12);
        answer = w*h; text = 'Area = ?';
        voice = 'What is the area of a rectangle that is '+w+' by '+h+'?';
        diagram = {type:'rectangle', w:w, h:h, label:'area'};
      } else {
        var base=rand(2,10)*2, height=rand(2,10);
        answer = (base*height)/2; text = 'Area = ?';
        voice = 'What is the area of a triangle with base '+base+' and height '+height+'?';
        diagram = {type:'triangle_area', base:base, height:height};
      }
      break;
    }
    case 'g5': { // angles, volume
      var r = Math.random();
      if (r < 0.35) { // missing triangle angle
        var a1=rand(30,80), a2=rand(30,180-a1-10); answer=180-a1-a2;
        text='Missing angle = ?'; voice='A triangle has angles '+a1+' degrees and '+a2+' degrees. What is the missing angle?';
        diagram={type:'triangle_angles',a1:a1,a2:a2,missing:answer};
      } else if (r < 0.65) { // volume of box
        var l=rand(2,8),w=rand(2,8),h=rand(2,8); answer=l*w*h;
        text='Volume = ?'; voice='What is the volume of a box that is '+l+' by '+w+' by '+h+'?';
        diagram={type:'box',l:l,w:w,h:h};
      } else { // area of square
        var s2=rand(3,12); answer=s2*s2;
        text='Area = ?'; voice='What is the area of a square with side length '+s2+'?';
        diagram={type:'square',s:s2};
      }
      break;
    }
    case 'g6': { // circles, surface area
      var r = Math.random();
      if (r < 0.35) { // area of circle (use π≈3.14, radius given, round answer)
        var rad=rand(2,10); answer=Math.round(3.14*rad*rad);
        text='Circle area? r='+rad; voice='What is the area of a circle with radius '+rad+'? Use 3.14 for pi. Round to nearest whole number.';
      } else if (r < 0.65) { // surface area of box (simple: 2(lw+lh+wh))
        var l=rand(2,5),w=rand(2,5),h=rand(2,5); answer=2*(l*w+l*h+w*h);
        text='Surface area? '+l+'×'+w+'×'+h; voice='What is the surface area of a box that is '+l+' by '+w+' by '+h+'?';
        diagram={type:'box',l:l,w:w,h:h};
      } else { // complementary angles
        var a1=rand(10,80); answer=90-a1;
        text='Complement of '+a1+'°?'; voice='What is the complement of '+a1+' degrees?';
        diagram={type:'angle_complement',a1:a1};
      }
      break;
    }
    case 'g7': { // circumference, composite shapes
      var r = Math.random();
      if (r < 0.3) { // circumference (2πr)
        var rad=rand(2,10); answer=Math.round(2*3.14*rad);
        text='Circumference? r='+rad; voice='What is the circumference of a circle with radius '+rad+'? Use 3.14 for pi. Round to nearest whole number.';
      } else if (r < 0.55) { // supplementary angles
        var a1=rand(20,160); answer=180-a1;
        text='Supplement of '+a1+'°?'; voice='What is the supplement of '+a1+' degrees?';
        diagram={type:'angle_supplement',a1:a1};
      } else if (r < 0.8) { // triangle perimeter
        var a=rand(3,15),b=rand(3,15),c=rand(Math.abs(a-b)+1,a+b-1); answer=a+b+c;
        text='Perimeter = ?'; voice='What is the perimeter of a triangle with sides '+a+', '+b+', and '+c+'?';
        diagram={type:'triangle_sides',a:a,b:b,c:c};
      } else { // triangle angles
        var a1=rand(25,75),a2=rand(25,180-a1-15); answer=180-a1-a2;
        text='Missing angle = ?'; voice='A triangle has angles '+a1+' and '+a2+' degrees. What is the third angle?';
        diagram={type:'triangle_angles',a1:a1,a2:a2,missing:answer};
      }
      break;
    }
    case 'g8': { // Pythagorean theorem, transformations
      var r = Math.random();
      if (r < 0.4) { // Pythagorean: a²+b²=c², find c (use perfect triples)
        var triples = [[3,4,5],[5,12,13],[6,8,10],[8,15,17],[9,12,15]];
        var triple = triples[rand(0,triples.length-1)];
        answer = triple[2];
        text = 'a='+triple[0]+', b='+triple[1]+', c=?';
        voice = 'A right triangle has legs '+triple[0]+' and '+triple[1]+'. What is the hypotenuse?';
        diagram = {type:'triangle_angles',a1:90,a2:Math.round(Math.atan(triple[0]/triple[1])*180/Math.PI),missing:Math.round(Math.atan(triple[1]/triple[0])*180/Math.PI)};
      } else if (r < 0.7) { // Pythagorean: find a leg
        var triples = [[3,4,5],[5,12,13],[6,8,10],[8,15,17]];
        var triple = triples[rand(0,triples.length-1)];
        answer = triple[0]; // find the shorter leg
        text = 'b='+triple[1]+', c='+triple[2]+', a=?';
        voice = 'A right triangle has hypotenuse '+triple[2]+' and one leg '+triple[1]+'. What is the other leg?';
      } else { // volume of cylinder (πr²h, round)
        var rad=rand(2,6), h=rand(3,10); answer=Math.round(3.14*rad*rad*h);
        text='Cylinder vol? r='+rad+', h='+h;
        voice='What is the volume of a cylinder with radius '+rad+' and height '+h+'? Use 3.14 for pi. Round to nearest whole number.';
      }
      break;
    }
    default: { // fallback: shapes
      var s = shapes[rand(0,shapes.length-1)];
      answer=s.sides; text='How many sides?'; voice='How many sides does a '+s.name+' have?';
      diagram={type:'polygon',name:s.name,sides:s.sides};
    }
  }
  correctAnswer = answer;
  return { text:text, answer:answer, voice:voice, diagram:diagram };
}

// ── FINANCE (5th through 8th) ──
function generateFinance() {
  var text, answer, voice, steps = [];
  var names = WORD_NAMES;
  var nm = names[rand(0, names.length-1)];

  switch(difficulty) {
    case 'g5': { // Coins, bills, making change
      var r = Math.random();
      if (r < 0.25) { // count coins
        var quarters=rand(0,4), dimes=rand(0,5), nickels=rand(0,4), pennies=rand(0,9);
        answer = quarters*25 + dimes*10 + nickels*5 + pennies;
        var parts = [];
        if(quarters)parts.push(quarters+' quarter'+(quarters>1?'s':''));
        if(dimes)parts.push(dimes+' dime'+(dimes>1?'s':''));
        if(nickels)parts.push(nickels+' nickel'+(nickels>1?'s':''));
        if(pennies)parts.push(pennies+' penn'+(pennies>1?'ies':'y'));
        if(!parts.length){parts.push('1 quarter');answer=25;} // avoid empty
        text = parts.join(' + ') + ' = ? cents';
        voice = nm+' has '+parts.join(', ')+'. How many cents total?';
      } else if (r < 0.5) { // making change
        var prices = [rand(1,4)*25, rand(2,8)*10+rand(0,1)*5]; // clean prices
        var price = prices[rand(0,1)];
        var paid = [100,200,500][rand(0,2)]; while(paid<=price) paid+=100;
        answer = paid - price;
        text = 'Paid: $'+((paid/100).toFixed(2))+', Cost: $'+((price/100).toFixed(2));
        voice = nm+' buys something for '+(price/100).toFixed(2)+' dollars and pays with a '+(paid>=500?'5':(paid>=200?'2':'1'))+' dollar bill. How many cents in change?';
      } else if (r < 0.75) { // add prices
        var p1 = rand(1,9)*10 + rand(0,9); // cents
        var p2 = rand(1,9)*10 + rand(0,9);
        answer = p1 + p2;
        var item1 = ['pencil','eraser','sticker','candy','juice box'][rand(0,4)];
        var item2 = ['notebook','ruler','snack','bookmark','crayon'][rand(0,4)];
        text = p1+'¢ + '+p2+'¢ = ?¢';
        voice = 'A '+item1+' costs '+p1+' cents and a '+item2+' costs '+p2+' cents. How much total in cents?';
      } else { // who has more? compare amounts
        var a1 = rand(3,15)*25; var a2 = rand(3,15)*25; while(a1===a2)a2=rand(3,15)*25;
        answer = Math.max(a1,a2);
        var nm2 = names[rand(0,names.length-1)]; while(nm2===nm)nm2=names[rand(0,names.length-1)];
        text = nm+': '+(a1/100).toFixed(2)+' vs '+nm2+': '+(a2/100).toFixed(2);
        voice = nm+' has '+(a1/100).toFixed(2)+' dollars. '+nm2+' has '+(a2/100).toFixed(2)+' dollars. Who has more? Enter their amount in cents.';
      }
      break;
    }
    case 'g6': { // Sales tax, discounts, budgets
      var r = Math.random();
      if (r < 0.25) { // discount
        var price = rand(2,20)*5; var pct = [10,15,20,25,30,50][rand(0,5)];
        var disc = price * pct / 100; answer = price - disc;
        text = '$'+price+' - '+pct+'% off = ?';
        voice = 'A shirt costs '+price+' dollars and is '+pct+' percent off. What is the sale price?';
        steps = [{type:'start',text:'Price: $'+price+', Discount: '+pct+'%'},{type:'work',text:'Discount = $'+price+' × '+pct+'% = $'+disc},{type:'work',text:'Sale price = $'+price+' - $'+disc},{type:'result',text:'= $'+answer}];
      } else if (r < 0.5) { // sales tax
        var price = rand(5,50); var tax = [5,6,7,8,10,13][rand(0,5)];
        var taxAmt = Math.round(price * tax / 100);
        answer = price + taxAmt;
        text = '$'+price+' + '+tax+'% tax = ?';
        voice = nm+' buys something for '+price+' dollars. Sales tax is '+tax+' percent. What is the total cost? Round to nearest dollar.';
        steps = [{type:'start',text:'Price: $'+price+', Tax: '+tax+'%'},{type:'work',text:'Tax = $'+price+' × '+tax+'% = $'+taxAmt},{type:'work',text:'Total = $'+price+' + $'+taxAmt},{type:'result',text:'= $'+answer}];
      } else if (r < 0.75) { // budget: can they afford it?
        var budget = rand(3,10)*10;
        var items = [];
        var total = 0;
        var count = rand(2,4);
        var itemNames = ['pizza','drink','popcorn','candy','fries','ice cream','cookie','chips'];
        for(var i=0;i<count;i++){
          var p = rand(2,Math.floor(budget/count)+5);
          items.push(itemNames[rand(0,itemNames.length-1)]+' $'+p);
          total += p;
        }
        answer = budget - total;
        if(answer < 0) { total = budget - rand(1,10); answer = budget - total; items=[]; items.push('items totaling $'+total); }
        text = 'Budget: $'+budget+', Spent: $'+total;
        voice = nm+' has a '+budget+' dollar budget and buys '+items.join(', ')+'. How much money is left?';
        steps = [{type:'start',text:'Budget: $'+budget},{type:'work',text:'Spent: $'+total},{type:'work',text:'Left = $'+budget+' - $'+total},{type:'result',text:'= $'+answer}];
      } else { // unit price comparison
        var qty1 = rand(3,8); var price1 = qty1 * rand(1,4);
        var qty2 = rand(3,8); while(qty2===qty1)qty2=rand(3,8);
        var price2 = qty2 * rand(1,4);
        var unit1 = Math.round(price1/qty1*100); var unit2 = Math.round(price2/qty2*100);
        answer = Math.min(unit1, unit2);
        text = qty1+' for $'+price1+' vs '+qty2+' for $'+price2;
        voice = 'Pack A has '+qty1+' items for '+price1+' dollars. Pack B has '+qty2+' items for '+price2+' dollars. What is the lower unit price in cents?';
        steps = [{type:'start',text:'Pack A: $'+price1+' ÷ '+qty1+' = '+unit1+'¢ each'},{type:'work',text:'Pack B: $'+price2+' ÷ '+qty2+' = '+unit2+'¢ each'},{type:'result',text:'Better deal: '+answer+'¢ per item'}];
      }
      break;
    }
    case 'g7': { // Interest, tips, unit prices
      var r = Math.random();
      if (r < 0.25) { // simple interest
        var principal = rand(5,50)*10; var rate = [2,3,4,5,6,8,10][rand(0,6)]; var years = rand(1,3);
        answer = principal * rate * years / 100;
        text = '$'+principal+' at '+rate+'% for '+years+'yr';
        voice = nm+' puts '+principal+' dollars in the bank at '+rate+' percent interest per year. How much interest after '+years+' year'+(years>1?'s':'')+'?';
        steps = [{type:'start',text:'I = P × r × t'},{type:'work',text:'I = $'+principal+' × '+rate+'% × '+years},{type:'work',text:'I = $'+principal+' × '+(rate/100)+' × '+years},{type:'result',text:'I = $'+answer}];
      } else if (r < 0.5) { // tip
        var bill = rand(4,30)*5; var tipPct = [10,15,18,20,25][rand(0,4)];
        answer = bill * tipPct / 100;
        text = tipPct+'% tip on $'+bill;
        voice = 'The restaurant bill is '+bill+' dollars. '+nm+' leaves a '+tipPct+' percent tip. How much is the tip?';
        steps = [{type:'start',text:'Bill: $'+bill+', Tip: '+tipPct+'%'},{type:'work',text:'Tip = $'+bill+' × '+tipPct+'%'},{type:'result',text:'Tip = $'+answer}];
      } else if (r < 0.75) { // savings goal
        var goal = rand(5,20)*10; var saved = rand(1, goal-10);
        var weekly = rand(5,15);
        var remaining = goal - saved;
        answer = Math.ceil(remaining / weekly);
        text = 'Goal: $'+goal+', Saved: $'+saved;
        voice = nm+' wants to save '+goal+' dollars. They already have '+saved+' dollars and save '+weekly+' per week. How many more weeks?';
        steps = [{type:'start',text:'Need: $'+goal+' - $'+saved+' = $'+remaining},{type:'work',text:'$'+remaining+' ÷ $'+weekly+'/week'},{type:'result',text:'= '+answer+' weeks'}];
      } else { // markup/profit
        var cost = rand(3,20)*5; var markup = [25,50,75,100][rand(0,3)];
        answer = cost + cost * markup / 100;
        text = 'Cost: $'+cost+', markup '+markup+'%';
        voice = 'A store buys an item for '+cost+' dollars and marks it up '+markup+' percent. What is the selling price?';
        steps = [{type:'start',text:'Cost: $'+cost+', Markup: '+markup+'%'},{type:'work',text:'Markup = $'+cost+' × '+markup+'% = $'+(cost*markup/100)},{type:'work',text:'Price = $'+cost+' + $'+(cost*markup/100)},{type:'result',text:'= $'+answer}];
      }
      break;
    }
    case 'g8': { // Compound interest, investing, loans
      var r = Math.random();
      if (r < 0.25) { // compound interest (1 year, compounded annually = simple)
        var principal = rand(5,20)*100; var rate = [5,6,8,10,12][rand(0,4)];
        var interest1 = Math.round(principal * rate / 100);
        var year2Principal = principal + interest1;
        var interest2 = Math.round(year2Principal * rate / 100);
        answer = principal + interest1 + interest2;
        text = '$'+principal+' at '+rate+'% for 2yr compounded';
        voice = nm+' invests '+principal+' dollars at '+rate+' percent compound interest. What is the total after 2 years? Round to nearest dollar.';
        steps = [{type:'start',text:'Year 1: $'+principal+' × '+rate+'% = $'+interest1},{type:'work',text:'After year 1: $'+year2Principal},{type:'work',text:'Year 2: $'+year2Principal+' × '+rate+'% = $'+interest2},{type:'result',text:'Total: $'+answer}];
      } else if (r < 0.5) { // loan payment
        var loan = rand(5,20)*100; var monthly = rand(5,25)*10;
        answer = Math.ceil(loan / monthly);
        text = 'Loan: $'+loan+', Pay $'+monthly+'/mo';
        voice = nm+' borrows '+loan+' dollars and pays '+monthly+' dollars per month. How many months to pay it off? Ignore interest.';
        steps = [{type:'start',text:'Loan: $'+loan},{type:'work',text:'$'+loan+' ÷ $'+monthly+'/month'},{type:'result',text:'= '+answer+' months'}];
      } else if (r < 0.75) { // percent increase/decrease
        var original = rand(10,100)*5; var pctChange = [10,15,20,25,30][rand(0,4)];
        if(Math.random()<0.5) {
          answer = Math.round(original * (1 + pctChange/100));
          text = '$'+original+' + '+pctChange+'% increase';
          voice = 'A stock is worth '+original+' dollars and goes up '+pctChange+' percent. What is it worth now?';
          steps = [{type:'start',text:'$'+original+' × (1 + '+pctChange+'%)'},{type:'work',text:'$'+original+' × '+(1+pctChange/100)},{type:'result',text:'= $'+answer}];
        } else {
          answer = Math.round(original * (1 - pctChange/100));
          text = '$'+original+' - '+pctChange+'% decrease';
          voice = 'A stock is worth '+original+' dollars and drops '+pctChange+' percent. What is it worth now?';
          steps = [{type:'start',text:'$'+original+' × (1 - '+pctChange+'%)'},{type:'work',text:'$'+original+' × '+(1-pctChange/100)},{type:'result',text:'= $'+answer}];
        }
      } else { // paycheck: hourly wage
        var hours = rand(15,40); var wage = rand(8,20);
        var gross = hours * wage;
        var taxPct = [10,15,20][rand(0,2)];
        var tax = Math.round(gross * taxPct / 100);
        answer = gross - tax;
        text = hours+'hrs × $'+wage+'/hr - '+taxPct+'% tax';
        voice = nm+' works '+hours+' hours at '+wage+' dollars per hour. After '+taxPct+' percent tax, what is the take-home pay?';
        steps = [{type:'start',text:'Gross: '+hours+' × $'+wage+' = $'+gross},{type:'work',text:'Tax: $'+gross+' × '+taxPct+'% = $'+tax},{type:'work',text:'Net: $'+gross+' - $'+tax},{type:'result',text:'= $'+answer}];
      }
      break;
    }
    default: { // fallback to g5
      var price = rand(1,5)*25; var paid = 500; answer = paid - price;
      text = 'Change from $5.00 for $'+(price/100).toFixed(2)+'?';
      voice = nm+' pays 5 dollars for something that costs '+(price/100).toFixed(2)+'. How many cents in change?';
    }
  }
  correctAnswer = answer;
  return { text:text, answer:answer, voice:voice, steps:steps };
}

// ── DIAGRAM RENDERER ──
function renderDiagram(diagram) {
  const el = document.getElementById('problemDiagram');
  if (!diagram) { el.classList.remove('show'); el.innerHTML = ''; return; }
  el.classList.add('show');
  el.innerHTML = '';

  const W = 260, H = 200;
  const ns = 'http://www.w3.org/2000/svg';
  const stroke = '#5b6abf';
  const fillC = 'rgba(91,106,191,0.1)';
  const textC = '#333';
  const accent = '#e74c3c';

  function makeSvg() {
    const s = document.createElementNS(ns, 'svg');
    s.setAttribute('width', W); s.setAttribute('height', H);
    s.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    return s;
  }
  function addEl(parent, tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (let k in attrs) e.setAttribute(k, attrs[k]);
    parent.appendChild(e);
    return e;
  }
  function addText(parent, x, y, txt, color, size, anchor) {
    const t = addEl(parent, 'text', {x, y, fill: color || textC, 'font-size': size || 14, 'font-weight': 'bold', 'font-family': 'Nunito', 'text-anchor': anchor || 'middle'});
    t.textContent = txt;
    return t;
  }
  function arcPath(vx, vy, ax, ay, bx, by, r) {
    let a1 = Math.atan2(ay - vy, ax - vx);
    let a2 = Math.atan2(by - vy, bx - vx);
    let diff = a2 - a1;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    let sweep = diff > 0 ? 1 : 0;
    let ex1 = vx + r * Math.cos(a1), ey1 = vy + r * Math.sin(a1);
    let ex2 = vx + r * Math.cos(a2), ey2 = vy + r * Math.sin(a2);
    let large = Math.abs(diff) > Math.PI ? 1 : 0;
    return 'M ' + ex1 + ',' + ey1 + ' A ' + r + ',' + r + ' 0 ' + large + ',' + sweep + ' ' + ex2 + ',' + ey2;
  }

  const svg = makeSvg();

  switch(diagram.type) {
    case 'polygon': {
      const n = diagram.sides, cx = W/2, cy = H/2 - 5, r = 70;
      let pts = '';
      for (let i = 0; i < n; i++) {
        let a = (Math.PI * 2 * i / n) - Math.PI/2;
        pts += (cx + r * Math.cos(a)) + ',' + (cy + r * Math.sin(a)) + ' ';
      }
      addEl(svg, 'polygon', {points: pts.trim(), fill: fillC, stroke, 'stroke-width': 3});
      // Animate: draw the polygon
      const poly = svg.querySelector('polygon');
      poly.style.strokeDasharray = '1000';
      poly.style.strokeDashoffset = '1000';
      poly.style.animation = 'drawShape 1.2s ease forwards';
      addText(svg, cx, H - 8, diagram.name, textC, 16);
      break;
    }
    case 'rectangle': {
      const rw = Math.min(180, diagram.w * 16), rh = Math.min(120, diagram.h * 12);
      const rx = (W - rw) / 2, ry = (H - rh) / 2;
      const rect = addEl(svg, 'rect', {x: rx, y: ry, width: rw, height: rh, fill: fillC, stroke, 'stroke-width': 3, rx: 3});
      rect.style.strokeDasharray = (rw + rh) * 2;
      rect.style.strokeDashoffset = (rw + rh) * 2;
      rect.style.animation = 'drawShape 1s ease forwards';
      addText(svg, rx + rw/2, ry - 8, diagram.w, textC, 15);
      addText(svg, rx - 14, ry + rh/2 + 5, diagram.h, textC, 15);
      if (diagram.label === 'area') addText(svg, rx+rw/2, ry+rh/2+6, 'Area?', accent, 14);
      break;
    }
    case 'square': {
      const ss = Math.min(140, diagram.s * 12);
      const rx = (W - ss) / 2, ry = (H - ss) / 2;
      const rect = addEl(svg, 'rect', {x: rx, y: ry, width: ss, height: ss, fill: fillC, stroke, 'stroke-width': 3, rx: 3});
      rect.style.strokeDasharray = ss * 4;
      rect.style.strokeDashoffset = ss * 4;
      rect.style.animation = 'drawShape 1s ease forwards';
      addText(svg, rx + ss/2, ry - 8, diagram.s, textC, 15);
      addText(svg, rx - 16, ry + ss/2 + 5, diagram.s, textC, 15);
      addEl(svg, 'rect', {x: rx, y: ry, width: 12, height: 12, fill: 'none', stroke, 'stroke-width': 1.5});
      break;
    }
    case 'triangle_area': {
      const bw = Math.min(200, diagram.base * 14), th = Math.min(140, diagram.height * 12);
      const bx = (W - bw) / 2, by = H - 30;
      const tx = bx + bw * 0.45, ty = by - th;
      const poly = addEl(svg, 'polygon', {points: bx+','+by+' '+(bx+bw)+','+by+' '+tx+','+ty, fill: fillC, stroke, 'stroke-width': 3});
      poly.style.strokeDasharray = '800'; poly.style.strokeDashoffset = '800';
      poly.style.animation = 'drawShape 1s ease forwards';
      // Dashed height line
      const hl = addEl(svg, 'line', {x1: tx, y1: ty, x2: tx, y2: by, stroke: accent, 'stroke-width': 2, 'stroke-dasharray': '5,4'});
      hl.style.opacity = '0'; hl.style.animation = 'fadeIn 0.5s 0.8s ease forwards';
      addText(svg, bx+bw/2, by+18, 'b = '+diagram.base, textC, 14);
      const ht = addText(svg, tx+18, ty+(by-ty)/2+4, 'h = '+diagram.height, accent, 13, 'start');
      ht.style.opacity = '0'; ht.style.animation = 'fadeIn 0.5s 1s ease forwards';
      break;
    }
    case 'triangle_angles': {
      // Calculate accurate triangle vertices from actual angles
      var angA = diagram.a1 * Math.PI / 180;
      var angB = diagram.a2 * Math.PI / 180;
      var angC = diagram.missing * Math.PI / 180;

      // Place base AB horizontal, compute apex C using angle math
      var baseLen = W - 100; // px for base
      var ax = 50, ay = H - 35;
      var bx2 = ax + baseLen, by2 = ay;

      // From A, line goes up at angle angA; from B, line goes up at (180 - angB)
      // t = baseLen * sin(angB) / sin(angA + angB)
      var t = baseLen * Math.sin(angB) / Math.sin(angA + angB);
      var cx2 = ax + t * Math.cos(angA);
      var cy2 = ay - t * Math.sin(angA);

      // Clamp apex so it stays in view
      if (cy2 < 15) {
        var scale = (ay - 15) / (ay - cy2);
        cx2 = ax + (cx2 - ax) * scale;
        cy2 = 15;
        // Recalc bx2 to keep proportions
        var t2 = baseLen * scale;
        bx2 = ax + t2 * Math.sin(angA + angB) / Math.sin(angB) * Math.cos(0);
        // Actually just scale the whole triangle
        bx2 = ax + baseLen * scale;
      }

      // Center the triangle horizontally
      var triMinX = Math.min(ax, bx2, cx2);
      var triMaxX = Math.max(ax, bx2, cx2);
      var offsetX = (W - (triMaxX - triMinX)) / 2 - triMinX;
      ax += offsetX; bx2 += offsetX; cx2 += offsetX;

      var poly = addEl(svg, 'polygon', {points: ax+','+ay+' '+bx2+','+by2+' '+cx2+','+cy2, fill: fillC, stroke, 'stroke-width': 3});
      poly.style.strokeDasharray = '800'; poly.style.strokeDashoffset = '800';
      poly.style.animation = 'drawShape 1s ease forwards';

      // Angle arc at A (between AB and AC)
      var arcR = 25;
      var arc1 = addEl(svg, 'path', {d: arcPath(ax,ay, bx2,by2, cx2,cy2, arcR), fill: 'none', stroke: '#e67e22', 'stroke-width': 2.5});
      arc1.style.opacity = '0'; arc1.style.animation = 'fadeIn 0.4s 0.8s ease forwards';
      // Label at A — offset toward the interior
      var labA_x = ax + (arcR + 14) * Math.cos(angA / 2);
      var labA_y = ay - (arcR + 14) * Math.sin(angA / 2);
      var t1 = addText(svg, labA_x, labA_y + 4, diagram.a1 + '°', '#e67e22', 12, 'start');
      t1.style.opacity = '0'; t1.style.animation = 'fadeIn 0.4s 0.9s ease forwards';

      // Angle arc at B (between BA and BC)
      var arc2 = addEl(svg, 'path', {d: arcPath(bx2,by2, cx2,cy2, ax,ay, arcR), fill: 'none', stroke: '#27ae60', 'stroke-width': 2.5});
      arc2.style.opacity = '0'; arc2.style.animation = 'fadeIn 0.4s 1.1s ease forwards';
      var labB_x = bx2 - (arcR + 14) * Math.cos(angB / 2);
      var labB_y = by2 - (arcR + 14) * Math.sin(angB / 2);
      var t2 = addText(svg, labB_x, labB_y + 4, diagram.a2 + '°', '#27ae60', 12, 'end');
      t2.style.opacity = '0'; t2.style.animation = 'fadeIn 0.4s 1.2s ease forwards';

      // Angle arc at C — the missing angle (between CA and CB)
      var arc3 = addEl(svg, 'path', {d: arcPath(cx2,cy2, ax,ay, bx2,by2, arcR), fill: 'none', stroke: accent, 'stroke-width': 2.5});
      arc3.style.opacity = '0'; arc3.style.animation = 'fadeIn 0.4s 1.4s ease forwards';
      // Label at C — push below the apex
      var midAng = Math.atan2(ay - cy2, (ax + bx2)/2 - cx2);
      var labC_x = cx2 + (arcR + 12) * Math.cos(midAng);
      var labC_y = cy2 + (arcR + 12) * Math.sin(midAng);
      var t3 = addText(svg, labC_x, labC_y + 4, '?°', accent, 14);
      t3.style.opacity = '0'; t3.style.animation = 'pulseIn 0.6s 1.5s ease forwards';
      break;
    }
    case 'triangle_sides': {
      const ax = 50, ay = H - 30, bx2 = W - 50, by2 = H - 30, cx2 = W * 0.4, cy2 = 30;
      const poly = addEl(svg, 'polygon', {points: ax+','+ay+' '+bx2+','+by2+' '+cx2+','+cy2, fill: fillC, stroke, 'stroke-width': 3});
      poly.style.strokeDasharray = '800'; poly.style.strokeDashoffset = '800';
      poly.style.animation = 'drawShape 1s ease forwards';
      addText(svg, (ax+bx2)/2, ay+18, diagram.a, textC, 14);
      addText(svg, (bx2+cx2)/2+14, (by2+cy2)/2, diagram.b, textC, 14);
      addText(svg, (ax+cx2)/2-18, (ay+cy2)/2, diagram.c, textC, 14);
      break;
    }
    case 'angle_complement': {
      const cx = W/2, cy = H - 40, r = 80;
      const a1Rad = diagram.a1 * Math.PI / 180;
      addEl(svg, 'line', {x1: cx-r-10, y1: cy, x2: cx+r+10, y2: cy, stroke: '#ccc', 'stroke-width': 2});
      addEl(svg, 'line', {x1: cx, y1: cy, x2: cx, y2: cy-r-10, stroke: '#ccc', 'stroke-width': 2});
      const angleLine = addEl(svg, 'line', {x1: cx, y1: cy, x2: cx+r*Math.cos(-a1Rad), y2: cy+r*Math.sin(-a1Rad), stroke, 'stroke-width': 3});
      angleLine.style.opacity = '0'; angleLine.style.animation = 'fadeIn 0.5s 0.3s ease forwards';
      // Known arc
      const p1 = 'M '+(cx+30)+','+cy+' A 30,30 0 0,0 '+(cx+30*Math.cos(-a1Rad))+','+(cy+30*Math.sin(-a1Rad));
      const arc1 = addEl(svg, 'path', {d: p1, fill: 'none', stroke: '#e67e22', 'stroke-width': 2.5});
      arc1.style.opacity = '0'; arc1.style.animation = 'fadeIn 0.4s 0.6s ease forwards';
      const t1 = addText(svg, cx+42, cy-10, diagram.a1+'°', '#e67e22', 14);
      t1.style.opacity = '0'; t1.style.animation = 'fadeIn 0.4s 0.7s ease forwards';
      // Unknown arc
      const p2 = 'M '+(cx+22*Math.cos(-a1Rad))+','+(cy+22*Math.sin(-a1Rad))+' A 22,22 0 0,0 '+cx+','+(cy-22);
      const arc2 = addEl(svg, 'path', {d: p2, fill: 'none', stroke: accent, 'stroke-width': 2.5});
      arc2.style.opacity = '0'; arc2.style.animation = 'fadeIn 0.4s 0.9s ease forwards';
      const t2 = addText(svg, cx-10, cy-44, '?°', accent, 15);
      t2.style.opacity = '0'; t2.style.animation = 'pulseIn 0.6s 1s ease forwards';
      addEl(svg, 'rect', {x: cx, y: cy-14, width: 14, height: 14, fill: 'none', stroke: '#888', 'stroke-width': 1.5});
      addText(svg, cx, H-5, '90° total', '#888', 12);
      break;
    }
    case 'angle_supplement': {
      const cx = W/2, cy = H - 40, r = 80;
      const a1Rad = diagram.a1 * Math.PI / 180;
      addEl(svg, 'line', {x1: cx-r-20, y1: cy, x2: cx+r+20, y2: cy, stroke, 'stroke-width': 3});
      const angleLine = addEl(svg, 'line', {x1: cx, y1: cy, x2: cx+r*Math.cos(-a1Rad), y2: cy+r*Math.sin(-a1Rad), stroke, 'stroke-width': 3});
      angleLine.style.opacity = '0'; angleLine.style.animation = 'fadeIn 0.5s 0.3s ease forwards';
      const p1 = 'M '+(cx+35)+','+cy+' A 35,35 0 0,0 '+(cx+35*Math.cos(-a1Rad))+','+(cy+35*Math.sin(-a1Rad));
      const arc1 = addEl(svg, 'path', {d: p1, fill: 'none', stroke: '#e67e22', 'stroke-width': 2.5});
      arc1.style.opacity = '0'; arc1.style.animation = 'fadeIn 0.4s 0.6s ease forwards';
      const t1 = addText(svg, cx+44, cy-16, diagram.a1+'°', '#e67e22', 14);
      t1.style.opacity = '0'; t1.style.animation = 'fadeIn 0.4s 0.7s ease forwards';
      const p2 = 'M '+(cx+28*Math.cos(-a1Rad))+','+(cy+28*Math.sin(-a1Rad))+' A 28,28 0 0,0 '+(cx-28)+','+cy;
      const arc2 = addEl(svg, 'path', {d: p2, fill: 'none', stroke: accent, 'stroke-width': 2.5});
      arc2.style.opacity = '0'; arc2.style.animation = 'fadeIn 0.4s 0.9s ease forwards';
      const t2 = addText(svg, cx-42, cy-16, '?°', accent, 15);
      t2.style.opacity = '0'; t2.style.animation = 'pulseIn 0.6s 1s ease forwards';
      addText(svg, cx, H-5, '180° straight line', '#888', 12);
      break;
    }
    case 'box': {
      const bw = Math.min(120, diagram.l * 14), bh = Math.min(80, diagram.h * 10), bd = 35;
      const bx = (W - bw) / 2, by = H - 40;
      addEl(svg, 'rect', {x: bx, y: by-bh, width: bw, height: bh, fill: fillC, stroke, 'stroke-width': 2.5});
      addEl(svg, 'polygon', {points: bx+','+(by-bh)+' '+(bx+bd)+','+(by-bh-bd)+' '+(bx+bw+bd)+','+(by-bh-bd)+' '+(bx+bw)+','+(by-bh), fill: 'rgba(91,106,191,0.15)', stroke, 'stroke-width': 2});
      addEl(svg, 'polygon', {points: (bx+bw)+','+(by-bh)+' '+(bx+bw+bd)+','+(by-bh-bd)+' '+(bx+bw+bd)+','+(by-bd)+' '+(bx+bw)+','+by, fill: 'rgba(91,106,191,0.08)', stroke, 'stroke-width': 2});
      addText(svg, bx+bw/2, by+16, diagram.l, textC, 13);
      addText(svg, bx-16, by-bh/2+4, diagram.h, textC, 13);
      addText(svg, bx+bw+bd/2+12, by-bh-bd/2, diagram.w, textC, 13);
      break;
    }
    default:
      el.classList.remove('show'); return;
  }
  el.appendChild(svg);
}

// ── CELEBRATIONS ──
var CONFETTI_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ff9f43','#00d2d3','#ff4757','#7bed9f','#eccc68'];
var CELEB_PHRASES = ['AMAZING! 🎉','BRILLIANT! 🌟','SUPERSTAR! ⭐','PERFECT! 💯','YOU ROCK! 🤘','FANTASTIC! 🔥','WOW! 🎆','INCREDIBLE! 💫','GENIUS! 🧠','ON FIRE! 🔥'];

function launchConfetti() {
  var count = 40 + rand(0, 20);
  for (var i = 0; i < count; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    var color = CONFETTI_COLORS[rand(0, CONFETTI_COLORS.length-1)];
    var size = rand(6, 14);
    var shape = Math.random() < 0.5 ? '50%' : rand(0,2) + 'px';
    el.style.width = size + 'px';
    el.style.height = (Math.random() < 0.3 ? size : size * rand(2,4) / 2) + 'px';
    el.style.background = color;
    el.style.borderRadius = shape;
    el.style.left = rand(5, 95) + 'vw';
    el.style.top = rand(-10, 10) + '%';
    el.style.animationDuration = (rand(15, 30) / 10) + 's';
    el.style.animationDelay = (rand(0, 8) / 10) + 's';
    document.body.appendChild(el);
    setTimeout(function(e){ e.remove(); }.bind(null, el), 4000);
  }
}

function launchFireworks() {
  var bursts = rand(3, 5);
  for (var b = 0; b < bursts; b++) {
    var cx = rand(15, 85);
    var cy = rand(10, 50);
    var delay = b * 300 + rand(0, 200);
    var color = CONFETTI_COLORS[rand(0, CONFETTI_COLORS.length-1)];
    var particles = rand(12, 20);
    for (var p = 0; p < particles; p++) {
      (function(cx, cy, delay, color, p, particles) {
        setTimeout(function() {
          var el = document.createElement('div');
          el.className = 'firework';
          el.style.background = color;
          el.style.boxShadow = '0 0 6px ' + color;
          var angle = (Math.PI * 2 * p / particles) + (Math.random() * 0.3);
          var dist = rand(40, 120);
          var startX = cx; var startY = cy;
          el.style.left = startX + 'vw';
          el.style.top = startY + 'vh';
          el.style.animationDuration = '0.8s';
          // Animate outward using CSS custom movement
          var endX = startX + (Math.cos(angle) * dist / 10);
          var endY = startY + (Math.sin(angle) * dist / 10);
          el.animate([
            { left: startX+'vw', top: startY+'vh', opacity: 1, transform: 'scale(1.5)' },
            { left: endX+'vw', top: endY+'vh', opacity: 0, transform: 'scale(0.3)' }
          ], { duration: 800, easing: 'ease-out', fill: 'forwards' });
          document.body.appendChild(el);
          setTimeout(function(){ el.remove(); }, 1000);
        }, delay);
      })(cx, cy, delay, color, p, particles);
    }
  }
}

function showCelebration() {
  // Confetti rain
  launchConfetti();
  // Firework bursts
  launchFireworks();
  // Big text
  var txt = document.createElement('div');
  txt.className = 'celebration-text';
  txt.textContent = CELEB_PHRASES[rand(0, CELEB_PHRASES.length-1)];
  document.body.appendChild(txt);
  setTimeout(function(){ txt.remove(); }, 1500);
}

// ── SOLUTION BREAKDOWN ──
// showMode: 'scaffold' = before answer (hide final result), 'full' = after answer (show everything)
function showSolution(steps, showMode) {
  if (!steps || !steps.length) return 0;
  const el = document.getElementById('solutionBreakdown');
  el.innerHTML = '';
  el.classList.add('show');

  const label = document.createElement('div');
  label.className = 'solution-label';
  label.textContent = showMode === 'scaffold' ? 'Hint — follow the steps:' : 'How to solve it:';
  el.appendChild(label);

  // For scaffold mode: show all steps except the final 'result' step
  // For full mode: show everything
  let stepsToShow = showMode === 'scaffold'
    ? steps.filter(s => s.type !== 'result')
    : steps;

  stepsToShow.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'solution-step step-' + step.type;
    row.style.animationDelay = (i * 0.5 + 0.2) + 's';

    const icon = document.createElement('div');
    icon.className = 'step-icon';
    icon.textContent = (i + 1);
    row.appendChild(icon);

    const txt = document.createElement('div');
    txt.className = 'step-text';
    txt.textContent = step.text;
    row.appendChild(txt);

    el.appendChild(row);
  });

  // For scaffold: add a "your turn!" prompt at the end
  if (showMode === 'scaffold') {
    const prompt = document.createElement('div');
    prompt.className = 'solution-step step-result';
    prompt.style.animationDelay = (stepsToShow.length * 0.5 + 0.2) + 's';
    const icon = document.createElement('div');
    icon.className = 'step-icon';
    icon.textContent = '?';
    prompt.appendChild(icon);
    const txt = document.createElement('div');
    txt.className = 'step-text';
    txt.style.color = '#e74c3c';
    txt.textContent = 'x = ? — Your turn!';
    prompt.appendChild(txt);
    el.appendChild(prompt);
    stepsToShow = [...stepsToShow, {type:'result'}]; // for timing
  }

  return stepsToShow.length * 500 + 500;
}

// Reveal just the final answer step (after correct/wrong when scaffold was shown)
function revealAnswer(steps, wasCorrect) {
  if (!steps || !steps.length) return 0;
  const el = document.getElementById('solutionBreakdown');

  // Remove the "your turn" prompt
  const lastStep = el.querySelector('.step-result');
  if (lastStep) lastStep.remove();

  // Add the real answer
  const resultStep = steps.find(s => s.type === 'result');
  if (resultStep) {
    const row = document.createElement('div');
    row.className = 'solution-step step-result';
    row.style.animationDelay = '0.1s';

    const icon = document.createElement('div');
    icon.className = 'step-icon';
    icon.textContent = wasCorrect ? '✓' : '✗';
    if (!wasCorrect) icon.style.background = '#e74c3c';
    row.appendChild(icon);

    const txt = document.createElement('div');
    txt.className = 'step-text';
    txt.textContent = resultStep.text;
    if (wasCorrect) txt.style.color = '#27ae60';
    row.appendChild(txt);

    el.appendChild(row);
  }
  return 800;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateChoices(answer) {
  const choices = new Set([answer]);
  while (choices.size < 4) {
    let offset = rand(1, Math.max(5, Math.floor(Math.abs(answer) * 0.4)));
    let wrong = answer + (Math.random() < 0.5 ? offset : -offset);
    if (wrong < 0 && difficulty !== 'expert') wrong = Math.abs(wrong);
    if (wrong !== answer) choices.add(wrong);
  }
  return shuffle([...choices]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── GAME LOOP ──
function startGame(diff) {
  difficulty = diff;
  score = 0;
  streak = 0;
  bestStreak = 0;
  totalCorrect = 0;
  totalAnswered = 0;
  questionNum = 0;
  canAnswer = true;
  subjectStreak = 0; // reset adaptive scaffolding

  if (currentMode === 'speed') {
    totalQuestions = 999;
    timeLeft = 60;
    document.getElementById('timerDisplay').textContent = '⏱ 60s';
    startTimer();
  } else if (currentMode === 'practice') {
    totalQuestions = 10;
    timeLeft = 0;
    document.getElementById('timerDisplay').textContent = `📋 0/${totalQuestions}`;
  } else {
    totalQuestions = 10;
    timeLeft = 0;
    document.getElementById('timerDisplay').textContent = `📋 0/${totalQuestions}`;
  }

  // Set world theme
  const world = worlds[rand(0, worlds.length - 1)];
  document.body.style.background = world.bg;
  document.getElementById('worldLabel').textContent = currentMode === 'adventure' ? world.name : '';

  showScreen('gameScreen');
  updateUI();
  nextQuestion();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerDisplay').textContent = `⏱ ${timeLeft}s`;
    if (timeLeft <= 10) {
      document.getElementById('timerDisplay').style.color = '#ff6b6b';
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function nextQuestion() {
  if ((currentMode === 'adventure' || currentMode === 'practice') && questionNum >= totalQuestions) {
    endGame();
    return;
  }

  canAnswer = true;
  questionNum++;
  const problem = generateProblem();
  var ptEl = document.getElementById('problemText');
  // If voice is a word problem (contains a name/story), show it as the display text
  if (problem.voice && problem.voice.length > 30) {
    ptEl.textContent = problem.voice;
    ptEl.classList.add('small-text');
  } else {
    ptEl.textContent = problem.text;
    ptEl.classList.remove('small-text');
  }
  currentSteps = problem.steps || [];

  // Hide solution breakdown from previous question
  document.getElementById('solutionBreakdown').classList.remove('show');
  document.getElementById('solutionBreakdown').innerHTML = '';

  // Adaptive scaffolding: show step-by-step BEFORE answer if student needs help
  if (currentSteps.length && subjectStreak < SCAFFOLD_THRESHOLD) {
    showSolution(currentSteps, 'scaffold');
  }

  // Show diagram if available (geometry)
  renderDiagram(problem.diagram || null);

  // Read the question aloud (use custom voice if provided)
  if (problem.voice) {
    speak(problem.voice);
  } else {
    speakQuestion(problem.text);
  }

  // Hint for easy mode
  if (difficulty === 'easy' && Math.random() < 0.3) {
    const parts = problem.text.split(' + ');
    if (parts.length === 2) {
      const a = parseInt(parts[0]);
      const dots = '🔵'.repeat(Math.min(a, 5));
      document.getElementById('problemHint').textContent = `${dots} + ...`;
    } else {
      document.getElementById('problemHint').textContent = '';
    }
  } else {
    document.getElementById('problemHint').textContent = '';
  }

  const choices = generateChoices(problem.answer);
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c;
    btn.onclick = () => checkAnswer(c, btn);
    grid.appendChild(btn);
  });

  updateUI();
}

async function checkAnswer(selected, btn) {
  if (!canAnswer) return;
  canAnswer = false;
  totalAnswered++;

  const buttons = document.querySelectorAll('.answer-btn');

  if (selected === correctAnswer) {
    // Correct!
    btn.classList.add('correct');
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const points = 10 + (streak * 2);
    score += points;
    totalCorrect++;

    playCorrect();
    showFeedback(correctPhrases[rand(0, correctPhrases.length - 1)]);
    spawnParticles(btn);
    showCelebration();

    if (streak > 0 && streak % 5 === 0) {
      showCombo(`🔥 ${streak}x COMBO!`);
      playCombo();
      score += 20; // bonus
    }

    // Highlight correct
    buttons.forEach(b => {
      if (parseInt(b.textContent) === correctAnswer) b.classList.add('correct');
    });

    // Wait for voice to finish
    await speakCorrect(correctAnswer);
    subjectStreak++;

    if (currentSteps.length) {
      if (subjectStreak <= SCAFFOLD_THRESHOLD) {
        // Scaffold was shown — reveal the answer step
        let waitTime = revealAnswer(currentSteps, true);
        setTimeout(nextQuestion, waitTime + 600);
      } else {
        // No scaffold was shown — student is doing great, just move on
        setTimeout(nextQuestion, 300);
      }
    } else {
      setTimeout(nextQuestion, 300);
    }
  } else {
    // Wrong
    btn.classList.add('wrong');
    streak = 0;
    subjectStreak = 0; // reset — they need scaffolding again
    playWrong();
    showFeedback(wrongPhrases[rand(0, wrongPhrases.length - 1)]);

    // Show correct answer
    buttons.forEach(b => {
      if (parseInt(b.textContent) === correctAnswer) b.classList.add('correct');
    });

    // Wait for voice, then show full breakdown so they learn
    await speakWrong(selected, correctAnswer);
    if (currentSteps.length) {
      if (subjectStreak === 0) {
        // Scaffold was already showing — just reveal the answer
        let waitTime = revealAnswer(currentSteps, false);
        setTimeout(nextQuestion, waitTime + 1200);
      } else {
        // Show full breakdown
        let waitTime = showSolution(currentSteps, 'full');
        setTimeout(nextQuestion, waitTime + 800);
      }
    } else {
      setTimeout(nextQuestion, 400);
    }
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  if (currentMode === 'adventure' || currentMode === 'practice') {
    document.getElementById('timerDisplay').textContent = `📋 ${questionNum}/${totalQuestions}`;
    document.getElementById('progressFill').style.width = `${(questionNum / totalQuestions) * 100}%`;
  } else if (currentMode === 'speed') {
    document.getElementById('progressFill').style.width = `${(timeLeft / 60) * 100}%`;
  } else {
    document.getElementById('progressFill').style.width = '100%';
  }
}

// ── EFFECTS ──
function showFeedback(text) {
  const el = document.getElementById('feedback');
  document.getElementById('feedbackText').textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 800);
}

function showCombo(text) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnParticles(btn) {
  const rect = btn.getBoundingClientRect();
  const emojis = ['⭐', '✨', '🌟', '💫', '🎉'];
  for (let i = 0; i < 5; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[rand(0, emojis.length - 1)];
    p.style.left = `${rect.left + rand(0, rect.width)}px`;
    p.style.top = `${rect.top}px`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function quitGame() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
  clearInterval(timerInterval);
  if (totalAnswered > 0) {
    endGame();
  } else {
    document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
    showScreen('titleScreen');
  }
}

// ── END GAME ──
function endGame() {
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').style.color = '';
  playFinish();
  var oldLevel = currentProfile ? Math.floor((currentProfile.totalCorrect || 0) / 20) + 1 : 1;
  saveGameResult();
  var newLevel = currentProfile ? Math.floor((currentProfile.totalCorrect || 0) / 20) + 1 : 1;

  const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;

  // Stars rating
  let stars, trophy, title;
  if (accuracy >= 90) { stars = '⭐⭐⭐'; trophy = '🏆'; title = 'AMAZING!'; }
  else if (accuracy >= 70) { stars = '⭐⭐'; trophy = '🥈'; title = 'Great Job!'; }
  else if (accuracy >= 50) { stars = '⭐'; trophy = '🥉'; title = 'Good Try!'; }
  else { stars = '💪'; trophy = '🎯'; title = 'Keep Practicing!'; }

  document.getElementById('resultsTrophy').textContent = trophy;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsStars').textContent = stars;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalCorrect').textContent = `${totalCorrect}/${totalAnswered}`;
  document.getElementById('finalStreak').textContent = bestStreak;
  document.getElementById('finalAccuracy').textContent = `${accuracy}%`;

  // Level up check
  var lvlMsg = document.getElementById('levelUpMsg');
  if (newLevel > oldLevel) {
    lvlMsg.style.display = 'block';
    lvlMsg.textContent = '🎉 LEVEL UP! You are now Level ' + newLevel + '!';
    speak('Level up! You are now level ' + newLevel + '! Amazing!');
  } else {
    lvlMsg.style.display = 'none';
  }

  document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
  showScreen('resultsScreen');
}
