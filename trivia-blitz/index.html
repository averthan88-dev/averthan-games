function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='sine',vol=.15){
ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();

o.connect(g);g.connect(audioCtx.destination);
o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
o.stop(audioCtx.currentTime+dur);
}

// ===== GAME STATE =====
let selectedCats=new Set(CATEGORIES.map(c=>c.id));
let gameQuestions=[];
let currentQ=0;
let score=0;
let streak=0;
let bestStreak=0;
let correctCount=0;
let timerInterval=null;
let timeLeft=15;
let answered=false;
let lifelines={fiftyFifty:true,skip:true,extraTime:true};
let catStats={};

// ===== MENU =====
function renderCatGrid(){
const grid=document.getElementById('cat-grid');
grid.innerHTML='';
CATEGORIES.forEach(cat=>{
const chip=document.createElement('div');
chip.className='cat-chip'+(selectedCats.has(cat.id)?' selected':'');
chip.style.background=`${cat.color}22`;
chip.innerHTML=`<span class="emoji">${cat.emoji}</span>${cat.name}`;
chip.onclick=()=>{
if(selectedCats.has(cat.id))selectedCats.delete(cat.id);else selectedCats.add(cat.id);
renderCatGrid();
document.getElementById('start-btn').disabled=selectedCats.size===0;
};
grid.appendChild(chip);
});
}
function selectAllCats(){selectedCats=new Set(CATEGORIES.map(c=>c.id));renderCatGrid()}
function deselectAllCats(){selectedCats.clear();renderCatGrid();document.getElementById('start-btn').disabled=true}

function showMenu(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('menu-screen').classList.add('active');
const hs=localStorage.getItem('triviaBlitzHigh');
document.getElementById('high-score-display').textContent=hs?`🏆 High Score: ${hs}`:'';
renderCatGrid();
}

// ===== START GAME =====
function startGame(){
ensureAudio();
const pool=Q.filter(q=>selectedCats.has(q.cat));
// Shuffle and pick 20
const shuffled=[...pool].sort(()=>Math.random()-.5);
gameQuestions=shuffled.slice(0,20);
if(gameQuestions.length<20){
// fill remaining with duplicates if needed
while(gameQuestions.length<20&&pool.length>0){
gameQuestions.push(pool[Math.floor(Math.random()*pool.length)]);
}
}
currentQ=0;score=0;streak=0;bestStreak=0;correctCount=0;answered=false;
lifelines={fiftyFifty:true,skip:true,extraTime:true};
catStats={};
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('quiz-screen').classList.add('active');
document.getElementById('ll-5050').disabled=false;
document.getElementById('ll-skip').disabled=false;
document.getElementById('ll-time').disabled=false;
showQuestion();
}

// ===== SHOW QUESTION =====
function showQuestion(){
if(currentQ>=gameQuestions.length){showResults();return}
answered=false;
const q=gameQuestions[currentQ];
document.getElementById('q-counter').textContent=`${currentQ+1} / ${gameQuestions.length}`;
document.getElementById('score-display').textContent=`Score: ${score}`;
document.getElementById('streak-display').textContent=streak>1?`🔥 ${streak}x Streak`:'';
const catObj=CATEGORIES.find(c=>c.id===q.cat);
document.getElementById('q-category').textContent=`${catObj.emoji} ${catObj.name}`;
document.getElementById('q-category').style.background=`${catObj.color}33`;
document.getElementById('q-category').style.color=catObj.color;
document.getElementById('q-text').textContent=q.q;
document.getElementById('fun-fact').style.display='none';
document.getElementById('next-btn').style.display='none';
// Shuffle answers
const indices=[0,1,2,3].sort(()=>Math.random()-.5);
const grid=document.getElementById('answers-grid');
grid.innerHTML='';
const labels=['A','B','C','D'];
indices.forEach((idx,i)=>{
const btn=document.createElement('button');
btn.className='answer-btn';
btn.dataset.idx=idx;
btn.textContent=`${labels[i]}. ${q.a[idx]}`;
btn.onclick=()=>selectAnswer(idx,btn);
grid.appendChild(btn);
});
startTimer(15);
}

function selectAnswer(idx,btn){
if(answered)return;
answered=true;
clearInterval(timerInterval);
const q=gameQuestions[currentQ];
const isCorrect=idx===q.c;
if(isCorrect){
btn.classList.add('correct');
streak++;
if(streak>bestStreak)bestStreak=streak;
const mult=Math.min(streak,5);
const pts=100*mult;
score+=pts;
correctCount++;
sndCorrect();
if(streak>=3)sndStreak();
spawnConfetti();
}else{
btn.classList.add('wrong');
streak=0;
sndWrong();
// highlight correct
document.querySelectorAll('.answer-btn').forEach(b=>{
if(parseInt(b.dataset.idx)===q.c)b.classList.add('correct');
});
}
// Track category stats
if(!catStats[q.cat])catStats[q.cat]={correct:0,total:0};
catStats[q.cat].total++;
if(isCorrect)catStats[q.cat].correct++;
// Disable all buttons
document.querySelectorAll('.answer-btn').forEach(b=>b.style.pointerEvents='none');
// Show fun fact
const ff=document.getElementById('fun-fact');
ff.innerHTML=`<span>💡 Fun Fact:</span> ${q.f}`;
ff.style.display='block';
document.getElementById('score-display').textContent=`Score: ${score}`;
document.getElementById('streak-display').textContent=streak>1?`🔥 ${streak}x Streak`:'';
document.getElementById('next-btn').style.display='inline-block';
}

// ===== TIMER =====
function startTimer(seconds){
timeLeft=seconds;
const bar=document.getElementById('timer-bar');
const txt=document.getElementById('timer-text');
bar.style.width='100%';
bar.classList.remove('low');
txt.classList.remove('low');
txt.textContent=timeLeft;
clearInterval(timerInterval);
const startTime=Date.now();
const totalMs=seconds*1000;
timerInterval=setInterval(()=>{
const elapsed=Date.now()-startTime;
const remaining=Math.max(0,totalMs-elapsed);
timeLeft=Math.ceil(remaining/1000);
const pct=(remaining/totalMs)*100;
bar.style.width=pct+'%';
txt.textContent=timeLeft;
if(timeLeft<=5){bar.classList.add('low');txt.classList.add('low');if(timeLeft>0)sndTick()}
else{bar.classList.remove('low');txt.classList.remove('low')}
if(remaining<=0){
clearInterval(timerInterval);
if(!answered)timeUp();
}
},100);
}

function timeUp(){
answered=true;
const q=gameQuestions[currentQ];
streak=0;
sndWrong();
document.querySelectorAll('.answer-btn').forEach(b=>{
b.style.pointerEvents='none';
if(parseInt(b.dataset.idx)===q.c)b.classList.add('correct');
});
if(!catStats[q.cat])catStats[q.cat]={correct:0,total:0};
catStats[q.cat].total++;
const ff=document.getElementById('fun-fact');
ff.innerHTML=`<span>⏰ Time's up!</span> ${q.f}`;
ff.style.display='block';
document.getElementById('streak-display').textContent='';
document.getElementById('next-btn').style.display='inline-block';
}

function nextQuestion(){
currentQ++;
showQuestion();
}

// ===== LIFELINES =====
function useFiftyFifty(){
if(!lifelines.fiftyFifty||answered)return;
lifelines.fiftyFifty=false;
document.getElementById('ll-5050').disabled=true;
const q=gameQuestions[currentQ];
const wrongBtns=[...document.querySelectorAll('.answer-btn')].filter(b=>parseInt(b.dataset.idx)!==q.c);
const toRemove=wrongBtns.sort(()=>Math.random()-.5).slice(0,2);
toRemove.forEach(b=>b.classList.add('removed'));
}
function useSkip(){
if(!lifelines.skip||answered)return;
lifelines.skip=false;
document.getElementById('ll-skip').disabled=true;
clearInterval(timerInterval);
if(!catStats[gameQuestions[currentQ].cat])catStats[gameQuestions[currentQ].cat]={correct:0,total:0};
catStats[gameQuestions[currentQ].cat].total++;
currentQ++;
showQuestion();
}
function useExtraTime(){
if(!lifelines.extraTime||answered)return;
lifelines.extraTime=false;
document.getElementById('ll-time').disabled=true;
// Add 10 seconds
const bar=document.getElementById('timer-bar');
const currentPct=parseFloat(bar.style.width)||0;
clearInterval(timerInterval);
startTimer(timeLeft+10);
}

// ===== CONFETTI =====
function spawnConfetti(){
const colors=['#6c5ce7','#a29bfe','#00cec9','#fd79a8','#fdcb6e','#00b894'];
for(let i=0;i<30;i++){
const c=document.createElement('div');
c.className='confetti-piece';
c.style.left=Math.random()*100+'vw';
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.width=(Math.random()*8+5)+'px';
c.style.height=(Math.random()*8+5)+'px';
c.style.borderRadius=Math.random()>.5?'50%':'2px';
c.style.animation=`confetti-fall ${Math.random()*2+1.5}s linear forwards`;
c.style.animationDelay=Math.random()*.3+'s';
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

// ===== RESULTS =====
function showResults(){
clearInterval(timerInterval);
sndGameOver();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('results-screen').classList.add('active');
const accuracy=gameQuestions.length>0?Math.round((correctCount/gameQuestions.length)*100):0;
let rank,rankColor;
if(accuracy>=95){rank='🌟 Trivia Legend';rankColor='#fdcb6e'}
else if(accuracy>=80){rank='🧠 Brain Master';rankColor='#00cec9'}
else if(accuracy>=65){rank='📚 Quiz Whiz';rankColor='#6c5ce7'}
else if(accuracy>=50){rank='🎯 Sharp Thinker';rankColor='#a29bfe'}
else if(accuracy>=30){rank='🌱 Quiz Learner';rankColor='#00b894'}
else{rank='🐣 Quiz Novice';rankColor='#fd79a8'}
document.getElementById('result-rank').textContent=rank;
document.getElementById('result-rank').style.color=rankColor;
document.getElementById('result-score').textContent=score;
// High score
const prev=parseInt(localStorage.getItem('triviaBlitzHigh'))||0;
if(score>prev){
localStorage.setItem('triviaBlitzHigh',score);
                if (typeof avReportScore === 'function') avReportScore('trivia-blitz', score);
document.getElementById('new-high').style.display='inline-block';
}else{
document.getElementById('new-high').style.display='none';
}
// Stats
document.getElementById('result-stats').innerHTML=`
<div class="stat-card"><div class="val">${correctCount}/${gameQuestions.length}</div><div class="label">Correct</div></div>
<div class="stat-card"><div class="val">${accuracy}%</div><div class="label">Accuracy</div></div>
<div class="stat-card"><div class="val">${bestStreak}🔥</div><div class="label">Best Streak</div></div>
<div class="stat-card"><div class="val">${score}</div><div class="label">Total Score</div></div>
`;
// Category breakdown
const bd=document.getElementById('cat-breakdown');
let html='<h3>📊 Category Breakdown</h3>';
for(const catId in catStats){
const cat=CATEGORIES.find(c=>c.id===catId);
const s=catStats[catId];
html+=`<div class="cat-row"><span>${cat.emoji} ${cat.name}</span><span>${s.correct}/${s.total}</span></div>`;
}
bd.innerHTML=html;
}

// ===== INIT =====
showMenu();
</script>
